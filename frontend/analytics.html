<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics | Personal OS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap');

    /* =========================================
       1. LIGHT MODE VARIABLES (Raw Concrete)
       ========================================= */
    :root {
      --bg-base: #dfdfdf;       /* User specified light base */
      --bg-surface: #ebebeb;    /* Slightly lighter for inputs/cards */
      --text-main: #1a1a1a;     /* Deep contrast text */
      --text-muted: #5a5a5a;    /* Mid-grey for secondary text */
      --border-main: #1a1a1a;   /* Harsh borders */
      --border-muted: #8a8a8a;  /* Subtle borders */
      --shadow-color: #1a1a1a;  /* Solid shadow */
      
      /* Pigments (Consistent across both modes) */
      --pigment-yellow: #c8a97e;
      --pigment-red: #c26e60;
      --pigment-purple: #8d7a8b;
      --pigment-blue: #6e8ca0;
    }

    /* =========================================
       2. DARK MODE VARIABLES (Matte Graphite)
       ========================================= */
    .dark {
      --bg-base: #222222;       /* User specified dark base */
      --bg-surface: #2c2c2c;    /* Slightly lighter for inputs/cards */
      --text-main: #ececec;     /* Crisp off-white text */
      --text-muted: #a3a3a3;    /* Mid-light grey for secondary */
      --border-main: #ececec;   /* Harsh light borders */
      --border-muted: #686868;  /* Subtle borders */
      --shadow-color: #111111;  /* Deep shadow to stand out against #383838 */
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .font-mono { font-family: 'JetBrains Mono', monospace; }

    /* =========================================
       3. COMPONENT STYLES (Variable-Driven)
       ========================================= */
    .brutal-block {
      border: 2px solid var(--border-main);
      background-color: var(--bg-base);
    }

    .brutal-interactive {
      border: 2px solid var(--border-main);
      background-color: var(--bg-base);
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .brutal-interactive:hover {
      transform: translate(-4px, -4px);
      box-shadow: 4px 4px 0px 0px var(--shadow-color);
      background-color: var(--bg-surface); 
    }

    .brutal-input {
      width: 100%;
      border: 2px solid var(--border-muted);
      background-color: var(--bg-surface);
      color: var(--text-main);
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      outline: none;
      transition: all 0.2s;
    }
    .brutal-input:focus {
      border-color: var(--border-main);
      background-color: var(--bg-base);
    }
    .brutal-input::placeholder {
      color: var(--text-muted);
    }

    /* =========================================
       4. DYNAMIC SVG ARROWS FOR SELECTS
       ========================================= */
    /* Light mode arrow (#1a1a1a) */
    select.brutal-input {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231a1a1a%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 1rem top 50%;
      background-size: 0.65rem auto;
      cursor: pointer;
    }
    /* Dark mode arrow (#ececec) */
    .dark select.brutal-input {
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ececec%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
    }
  </style>
</head>

<body class="selection:bg-[var(--border-main)] selection:text-[var(--bg-base)] p-4 sm:p-8 md:p-12 lg:p-16 flex justify-center">

  <main class="w-full max-w-6xl relative">

    <!-- System Coordinates / Metadata -->
    <div class="flex justify-between items-start mb-8 text-[10px] font-mono uppercase tracking-widest text-[var(--text-muted)] relative z-50">
      <div class="flex flex-col gap-1">
        <span>SYS.ANALYTICS // OS</span>
        <span id="current-date-display">--.--.--</span>
      </div>

      <!-- Navigation Dropdown -->
      <div class="relative group z-50">
        <div class="flex items-center gap-2">
          <button onclick="toggleTheme()" class="p-2 text-[var(--text-muted)] hover:text-[var(--text-main)] transition-colors cursor-pointer" aria-label="Toggle Theme">
            <i data-lucide="moon" class="w-4 h-4 theme-icon"></i>
          </button>
          <button class="p-2 text-[var(--text-muted)] hover:text-[var(--text-main)] transition-colors cursor-pointer" aria-label="Menu">
            <i data-lucide="menu" class="w-4 h-4"></i>
          </button>
        </div>
        
        <!-- Dropdown Content -->
        <div class="absolute right-0 mt-2 w-48 bg-[var(--bg-base)] border-2 border-[var(--border-main)] shadow-[4px_4px_0px_0px_var(--shadow-color)] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 flex flex-col z-50 text-left">
          <a href="/dashboard.html" class="px-4 py-3 border-b-2 border-dashed border-[var(--border-muted)] text-sm font-bold uppercase tracking-tighter text-[var(--text-main)] hover:bg-[var(--bg-surface)] hover:text-[var(--pigment-blue)] transition-colors flex items-center gap-2 normal-case">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
          </a>
          <a href="/goals.html" class="px-4 py-3 border-b-2 border-dashed border-[var(--border-muted)] text-sm font-bold uppercase tracking-tighter text-[var(--text-main)] hover:bg-[var(--bg-surface)] hover:text-[var(--pigment-purple)] transition-colors flex items-center gap-2 normal-case">
            <i data-lucide="target" class="w-4 h-4"></i> Goals
          </a>
          <a href="/projects.html" class="px-4 py-3 border-b-2 border-dashed border-[var(--border-muted)] text-sm font-bold uppercase tracking-tighter text-[var(--text-main)] hover:bg-[var(--bg-surface)] hover:text-[var(--pigment-red)] transition-colors flex items-center gap-2 normal-case">
            <i data-lucide="folder" class="w-4 h-4"></i> Projects
          </a>
          <a href="/skills.html" class="px-4 py-3 border-b-2 border-dashed border-[var(--border-muted)] text-sm font-bold uppercase tracking-tighter text-[var(--text-main)] hover:bg-[var(--bg-surface)] hover:text-[var(--pigment-yellow)] transition-colors flex items-center gap-2 normal-case">
            <i data-lucide="brain" class="w-4 h-4"></i> Skills
          </a>
          <a href="/health.html" class="px-4 py-3 border-b-2 border-dashed border-[var(--border-muted)] text-sm font-bold uppercase tracking-tighter text-[var(--text-main)] hover:bg-[var(--bg-surface)] hover:text-[var(--pigment-yellow)] transition-colors flex items-center gap-2 normal-case">
            <i data-lucide="activity" class="w-4 h-4"></i> Health
          </a>
          <a href="/fitness.html" class="px-4 py-3 border-b-2 border-dashed border-[var(--border-muted)] text-sm font-bold uppercase tracking-tighter text-[var(--text-main)] hover:bg-[var(--bg-surface)] hover:text-[var(--pigment-blue)] transition-colors flex items-center gap-2 normal-case">
            <i data-lucide="dumbbell" class="w-4 h-4"></i> Fitness
          </a>
          <a href="/analytics.html" class="px-4 py-3 border-b-2 border-dashed border-[var(--border-muted)] text-sm font-bold uppercase tracking-tighter text-[var(--text-main)] hover:bg-[var(--bg-surface)] transition-colors flex items-center gap-2 normal-case">
            <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Analytics
          </a>
          <a href="/settings.html" class="px-4 py-3 text-sm font-bold uppercase tracking-tighter text-[var(--text-main)] hover:bg-[var(--bg-surface)] transition-colors flex items-center gap-2 normal-case">
            <i data-lucide="settings" class="w-4 h-4"></i> Settings
          </a>
        </div>
      </div>
    </div>

    <!-- Header Section -->
    <header
      class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6 border-b-4 border-[var(--border-main)] pb-8 mt-4 md:mt-0">
      <div>
        <h1 class="text-5xl md:text-7xl font-black tracking-tighter uppercase leading-none">
          Analytics
        </h1>
      </div>

      <!-- Time Range Selector -->
      <div class="relative w-full md:w-56">
        <select id="time-range"
          class="w-full brutal-block bg-[var(--bg-surface)] hover:bg-[var(--border-muted)] p-4 pr-10 font-bold uppercase tracking-widest text-xs outline-none cursor-pointer transition-colors"
          onchange="handleTimeRangeChange()">
          <option value="7">Last 7 Days</option>
          <option value="30" selected>Last 30 Days</option>
          <option value="90">Last 90 Days</option>
          <option value="365">This Year</option>
          <option value="all">All Time</option>
        </select>
      </div>
    </header>

    <!-- Insights Ticker -->
    <div id="insights-container"
      class="hidden mb-12 p-4 md:p-6 border-l-[4px] bg-[var(--bg-surface)] relative overflow-hidden transition-colors duration-300">
      <!-- Injected via JS -->
    </div>

    <!-- Tabs Area (Architectural Color Block style) -->
    <div class="mb-12 border-b-2 border-[var(--border-muted)]">
      <div class="flex gap-2 overflow-x-auto no-scrollbar pb-4 pt-2 px-2 -mx-2" id="tabs-container">
        <!-- Injected via JS -->
      </div>
    </div>

    <!-- Dynamic Analytics Content -->
    <div id="analytics-content" class="min-h-[400px]">
      <!-- Content renders instantly now -->
    </div>

  </main>

  <script>
    // Initialize Icons
    lucide.createIcons();

    // Concrete Palette mapping for Tabs & Charts
    const TABS_CONFIG = [
      { id: 'Overview', color: '#e8eceb', dark: '#31353c', icon: 'grid' },
      { id: 'Skills', color: '#c8a97e', dark: '#31353c', icon: 'zap' },     // Yellow
      { id: 'Projects', color: '#c26e60', dark: '#ffffff', icon: 'layers' }, // Red
      { id: 'Fitness', color: '#6e8ca0', dark: '#ffffff', icon: 'activity' },// Blue
      { id: 'Health', color: '#738276', dark: '#ffffff', icon: 'heart' },   // Green
      { id: 'Goals', color: '#8d7a8b', dark: '#ffffff', icon: 'target' },   // Purple
      { id: 'Productivity', color: '#d69695', dark: '#31353c', icon: 'clock' } // Pink
    ];

    let activeTab = 'Overview';
    let timeRange = '30';
    let currentData = null;
    let chartInstance = null;

    document.addEventListener('DOMContentLoaded', async () => {
      initTabs();
      await fetchInsights();
      await fetchData();
    });

    function getActiveConfig() {
      return TABS_CONFIG.find(t => t.id === activeTab) || TABS_CONFIG[0];
    }

    // Initialize tabs once so CSS transitions can run on state change
    function initTabs() {
      const container = document.getElementById('tabs-container');
      container.innerHTML = TABS_CONFIG.map(tab => {
        const baseClass = "tab-item flex items-center gap-2 px-4 py-3 font-bold uppercase tracking-widest text-xs whitespace-nowrap cursor-pointer border-2";

        return `
          <button
            id="tab-btn-${tab.id}"
            onclick="setActiveTab('${tab.id}')"
            class="${baseClass}"
          >
            <i data-lucide="${tab.icon}" class="w-4 h-4"></i>
            ${tab.id}
          </button>
        `;
      }).join('');
      lucide.createIcons();
      updateTabs();
    }

    // Update styles on existing elements to trigger animation
    function updateTabs() {
      TABS_CONFIG.forEach(tab => {
        const btn = document.getElementById(`tab-btn-${tab.id}`);
        const isActive = activeTab === tab.id;

        if (isActive) {
          btn.classList.add('active-tab');
          btn.style.backgroundColor = tab.color;
          btn.style.color = tab.dark;
          btn.style.boxShadow = '4px 4px 0px 0px var(--shadow-color)';
          btn.style.transform = 'translate(-4px, -4px)';
          btn.style.borderColor = 'var(--border-main)';
        } else {
          btn.classList.remove('active-tab');
          btn.style.backgroundColor = 'transparent';
          btn.style.color = 'var(--text-muted)';
          btn.style.boxShadow = 'none';
          btn.style.transform = 'translate(0px, 0px)';
          btn.style.borderColor = 'var(--border-muted)';
        }
      });
    }

    async function setActiveTab(tab) {
      activeTab = tab;
      updateTabs();
      await fetchData();
    }

    async function handleTimeRangeChange() {
      timeRange = document.getElementById('time-range').value;
      await fetchInsights();
      await fetchData();
    }

    // --- REAL API FETCH LOGIC ---
    async function fetchInsights() {
      try {
        const res = await fetch(`http://localhost:3000/api/analytics/insights?days=${timeRange}`);
        if (res.ok) {
          const insights = await res.json();
          const config = getActiveConfig();
          const container = document.getElementById('insights-container');

          if (insights && insights.length > 0) {
            container.classList.remove('hidden');
            container.style.borderLeftColor = config.color !== '#e8eceb' ? config.color : 'var(--border-main)';

            container.innerHTML = `
              <div class="absolute top-4 right-4 text-[var(--text-muted)]"><i data-lucide="zap" class="w-4 h-4"></i></div>
              <div class="text-[10px] font-mono uppercase tracking-widest text-[var(--text-muted)] mb-3">System Insights</div>
              ${insights.map(i => `<p class="font-bold text-sm md:text-base mb-1 last:mb-0 text-[var(--text-main)]">> ${i}</p>`).join('')}
            `;
            lucide.createIcons();
          } else {
            container.classList.add('hidden');
          }
        }
      } catch (e) {
        console.error("Failed to fetch insights:", e);
      }
    }

    async function fetchData() {
      // Show loading telemetry screen
      document.getElementById('analytics-content').innerHTML = `
        <div class="flex items-center gap-3 text-[var(--text-muted)] font-mono text-sm uppercase tracking-widest animate-pulse mt-8">
          <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
          Processing Telemetry...
        </div>`;
      lucide.createIcons();

      try {
        const res = await fetch(`http://localhost:3000/api/analytics/${activeTab.toLowerCase()}?days=${timeRange}`);
        if (res.ok) {
          currentData = await res.json();
          renderContent();
        } else {
          document.getElementById('analytics-content').innerHTML = `
            <div class="p-6 border-2 border-[var(--pigment-red)] bg-[var(--bg-surface)] text-[var(--pigment-red)] font-mono text-sm uppercase tracking-widest mt-8">
              Error: Failed to process telemetry data.
            </div>`;
        }
      } catch (e) {
        console.error("Failed to fetch data:", e);
        document.getElementById('analytics-content').innerHTML = `
            <div class="p-6 border-2 border-[var(--pigment-red)] bg-[var(--bg-surface)] text-[var(--pigment-red)] font-mono text-sm uppercase tracking-widest mt-8">
              System Error: Connection to backend failed. Check localhost:3000.
            </div>`;
      }
    }

    function renderKPI(label, value, suffix = '', accentColor = 'var(--border-main)') {
      return `
        <div class="brutal-block p-6 flex flex-col justify-between min-h-[160px] relative overflow-hidden">
          <div class="absolute -right-4 -top-4 w-16 h-16 opacity-10 rounded-full" style="background-color: ${accentColor}"></div>
          <div class="flex justify-between items-start mb-4">
            <h3 class="font-mono text-[10px] uppercase tracking-widest text-[var(--text-muted)]">${label}</h3>
          </div>
          <div class="flex items-baseline gap-2 z-10">
            <span class="text-5xl md:text-6xl font-black tracking-tighter text-[var(--text-main)]">${value || 0}</span>
            ${suffix ? `<span class="font-mono text-xs uppercase tracking-widest text-[var(--text-muted)] font-bold">${suffix}</span>` : ''}
          </div>
        </div>
      `;
    }

    function renderContent() {
      const container = document.getElementById('analytics-content');
      if (!currentData) return;

      const m = currentData.metrics || {};
      const c = currentData.charts || {};
      const activeColor = getActiveConfig().color !== '#e8eceb' ? getActiveConfig().color : 'var(--border-main)';
      let html = '';

      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }

      const gridClass = "grid grid-cols-2 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-12";

      switch (activeTab) {
        case 'Overview':
          html = `
            <div class="${gridClass}">
              ${renderKPI('ACTIVE SKILLS', m.activeSkills, '', '#c8a97e')}
              ${renderKPI('ACTIVE PROJECTS', m.activeProjects, '', '#c26e60')}
              ${renderKPI('WORKOUT STREAK', m.workoutStreak, 'DAYS', '#6e8ca0')}
              ${renderKPI('LEARNING STREAK', m.learningStreak, 'DAYS', '#d69695')}
            </div>
          `;
          container.innerHTML = html;
          break;

        case 'Skills':
          html = `
            <div class="${gridClass}">
              ${renderKPI('TOTAL HOURS', m.totalHours, 'HRS', activeColor)}
              ${renderKPI('SESSIONS', m.sessions, '', activeColor)}
              ${renderKPI('ACTIVE SKILLS', m.activeSkills, '', activeColor)}
              ${renderKPI('COMPLETED SKILLS', m.completedSkills, '', activeColor)}
            </div>
            ${c.hoursTrend ? renderChartContainer('LEARNING HOURS TREND') : ''}
          `;
          container.innerHTML = html;
          if (c.hoursTrend) initLineChart('chart-canvas', c.hoursTrend.map(d => d.month), c.hoursTrend.map(d => d.hours), 'Hours', true, activeColor);
          break;

        case 'Projects':
          html = `
            <div class="grid grid-cols-2 gap-4 md:gap-6 mb-12">
              ${renderKPI('ACTIVE PROJECTS', m.activeProjects, '', activeColor)}
              ${renderKPI('COMPLETED PROJECTS', m.completedProjects, '', activeColor)}
            </div>
            ${c.projectsTrend ? renderChartContainer('PROJECT PROGRESS TREND') : ''}
          `;
          container.innerHTML = html;
          if (c.projectsTrend) {
            initBarChart('chart-canvas', c.projectsTrend.map(d => d.month), [
              { label: 'Completed', data: c.projectsTrend.map(d => d.completed), backgroundColor: 'var(--text-main)' },
              { label: 'Active', data: c.projectsTrend.map(d => d.active), backgroundColor: activeColor }
            ]);
          }
          break;

        case 'Fitness':
          html = `
            <div class="grid grid-cols-2 gap-4 md:gap-6 mb-12">
              ${renderKPI('TOTAL WORKOUTS', m.totalWorkouts, '', activeColor)}
              ${renderKPI('TRAINING HOURS', m.totalHours, 'HRS', activeColor)}
            </div>
            ${c.hoursTrend ? renderChartContainer('TRAINING HOURS TREND') : ''}
          `;
          container.innerHTML = html;
          if (c.hoursTrend) initLineChart('chart-canvas', c.hoursTrend.map(d => d.month), c.hoursTrend.map(d => d.hours), 'Hours', false, activeColor);
          break;

        case 'Health':
          html = `
            <div class="grid grid-cols-2 gap-4 md:gap-6 mb-12">
              ${renderKPI('CURRENT WEIGHT', m.currentWeight, 'KG', activeColor)}
              ${renderKPI('WEIGHT CHANGE', m.weightChange, 'KG', activeColor)}
            </div>
            ${c.weightTrend ? renderChartContainer('WEIGHT TREND') : ''}
          `;
          container.innerHTML = html;
          if (c.weightTrend) initLineChart('chart-canvas', c.weightTrend.map(d => d.date), c.weightTrend.map(d => d.weight), 'Weight (kg)', false, activeColor);
          break;

        case 'Goals':
          html = `
            <div class="grid grid-cols-2 gap-4 md:gap-6 mb-12">
              ${renderKPI('ACTIVE GOALS', m.activeGoals, '', activeColor)}
              ${renderKPI('COMPLETED GOALS', m.completedGoals, '', activeColor)}
            </div>
            ${c.goalTrend ? renderChartContainer('GOALS COMPLETED') : ''}
          `;
          container.innerHTML = html;
          if (c.goalTrend) initBarChart('chart-canvas', c.goalTrend.map(d => d.month), [
            { label: 'Completed', data: c.goalTrend.map(d => d.count), backgroundColor: activeColor }
          ]);
          break;

        case 'Productivity':
          html = `
            <div class="grid grid-cols-1 gap-4 md:gap-6 mb-12">
              ${renderKPI('TASKS COMPLETED', m.totalCompletedTasks, '', activeColor)}
            </div>
            ${c.dailyTrend ? renderChartContainer('DAILY COMPLETION TREND') : ''}
          `;
          container.innerHTML = html;
          if (c.dailyTrend) initBarChart('chart-canvas', c.dailyTrend.map(d => d.date), [
            { label: 'Tasks', data: c.dailyTrend.map(d => d.tasks), backgroundColor: activeColor }
          ]);
          break;
      }
      lucide.createIcons();
    }

    function renderChartContainer(title) {
      return `
        <div class="brutal-block p-6 h-[400px] flex flex-col relative">
          <div class="flex items-center justify-between mb-6 border-b-2 border-[var(--border-muted)] pb-4">
             <h3 class="font-mono text-xs uppercase tracking-widest text-[var(--text-main)] font-bold">${title}</h3>
             <i data-lucide="bar-chart-2" class="w-4 h-4 text-[var(--text-muted)]"></i>
          </div>
          <div class="relative flex-grow w-full">
             <canvas id="chart-canvas"></canvas>
          </div>
        </div>
      `;
    }

    // Brutalist Chart.js Defaults
    Chart.defaults.font.family = "'JetBrains Mono', monospace";
    const rootStyles = getComputedStyle(document.documentElement);
    const textColor = rootStyles.getPropertyValue('--text-main').trim();
    const borderMuted = rootStyles.getPropertyValue('--border-muted').trim();
    const borderMain = rootStyles.getPropertyValue('--border-main').trim();

    Chart.defaults.color = textColor;

    const getBrutalistOptions = () => ({
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          position: 'top',
          align: 'end',
          labels: { boxWidth: 12, boxHeight: 12, usePointStyle: false, font: { weight: 'bold', size: 10 } }
        },
        tooltip: {
          backgroundColor: textColor,
          titleFont: { family: "'JetBrains Mono', monospace", size: 11 },
          bodyFont: { family: "'JetBrains Mono', monospace", size: 12, weight: 'bold' },
          cornerRadius: 0,
          padding: 12,
          displayColors: false
        }
      },
      scales: {
        x: {
          grid: { color: borderMuted, drawBorder: true, borderColor: borderMain, borderWidth: 2, tickLength: 8 },
          ticks: { font: { size: 10 }, padding: 8 }
        },
        y: {
          grid: { color: borderMuted, borderDash: [4, 4], drawBorder: true, borderColor: borderMain, borderWidth: 2 },
          ticks: { font: { size: 10 }, padding: 8 },
          beginAtZero: true
        }
      },
      layout: { padding: 10 },
      elements: {
        line: { tension: 0 }, // Strict sharp lines
        bar: { borderWidth: 2, borderColor: borderMain }
      }
    });

    function initLineChart(canvasId, labels, data, label, stepped = false, accentColor = 'var(--text-main)') {
      const ctx = document.getElementById(canvasId).getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label,
            data,
            borderColor: borderMain,
            backgroundColor: accentColor,
            borderWidth: 3,
            pointBackgroundColor: accentColor,
            pointBorderColor: borderMain,
            pointBorderWidth: 3,
            pointRadius: 6,
            pointHoverRadius: 8,
            stepped: stepped
          }]
        },
        options: getBrutalistOptions()
      });
    }

    function initBarChart(canvasId, labels, datasets) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      // Apply brutalist borders to bars
      datasets = datasets.map(ds => ({
        ...ds,
        borderWidth: 3,
        borderColor: borderMain
      }));

      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets },
        options: {
          ...getBrutalistOptions(),
          elements: { bar: { borderRadius: 0 } } // Sharp corners
        }
      });
    }

    document.getElementById('current-date-display').textContent = new Date().toLocaleDateString('en-GB').replace(/\//g, '.');
  </script>
  <script src="/app.js"></script>
</body>

</html>
