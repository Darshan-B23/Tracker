<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health & Nutrition | Personal OS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Custom Brutalist Styling - Concrete + Pigment System */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap');

    :root {
      --bg-base: #ffffff;
      --text-main: #31353c;
      /* Concrete Black */
      --border-light: #e8eceb;
      /* Concrete White */
      --shadow-color: #31353c;

      /* Pigments */
      --pigment-yellow: #c8a97e;
      --pigment-red: #c26e60;
      --pigment-purple: #8d7a8b;
      --pigment-blue: #6e8ca0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Static Brutal Block */
    .brutal-block {
      border: 2px solid var(--text-main);
      background-color: var(--bg-base);
    }

    /* Interactive Brutal Block (Lifts on hover) */
    .brutal-interactive {
      border: 2px solid var(--text-main);
      background-color: var(--bg-base);
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .brutal-interactive:hover {
      transform: translate(-4px, -4px);
      box-shadow: 4px 4px 0px 0px var(--shadow-color);
    }

    /* Brutalist Inputs */
    .brutal-input {
      width: 100%;
      border: 2px solid var(--text-main);
      background-color: #f9fafb;
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      outline: none;
      transition: background-color 0.2s;
    }

    .brutal-input:focus {
      background-color: var(--bg-base);
    }

    /* Hide Number Input Arrows */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>

<body class="selection:bg-[#e8eceb] p-4 sm:p-8 md:p-12 lg:p-16 flex justify-center">

  <script src="/app.js"></script>
  <script>
    // Initialize Icons & Date
    lucide.createIcons();
    document.getElementById('current-date-display').textContent = new Date().toLocaleDateString('en-GB').replace(/\//g, '.');

    let globalTargets = { protein_target: 150, calorie_target: 2200, water_target: 3.0 };
    let globalLogs = [];

    // Safely generate local date string "YYYY-MM-DD"
    const localDate = new Date();
    localDate.setMinutes(localDate.getMinutes() - localDate.getTimezoneOffset());
    const todayDateStr = localDate.toISOString().split('T')[0];

    // Format utility
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-GB').replace(/\//g, '.');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('log-date').value = todayDateStr;
      document.getElementById('metric-date').value = todayDateStr;

      await fetchData();

      document.getElementById('log-date').addEventListener('change', updateLogFormWithSelectedDate);
      document.getElementById('targets-form').addEventListener('submit', handleUpdateTargets);
      document.getElementById('log-form').addEventListener('submit', handleSaveLog);
      document.getElementById('metric-form').addEventListener('submit', handleSaveMetric);
      document.getElementById('recipe-form').addEventListener('submit', handleCreateRecipe);
    });

    async function fetchData() {
      try {
        const [tRes, nRes, mRes, rRes] = await Promise.all([
          fetch('http://localhost:3000/api/health/targets'),
          fetch('http://localhost:3000/api/health/nutrition'),
          fetch('http://localhost:3000/api/health/metrics'),
          fetch('http://localhost:3000/api/health/recipes')
        ]);

        if (tRes.ok) {
          globalTargets = await tRes.json();
          document.getElementById('target-calories').value = globalTargets.calorie_target || 0;
          document.getElementById('target-protein').value = globalTargets.protein_target || 0;
          document.getElementById('target-water').value = globalTargets.water_target || 0;
        }
        if (nRes.ok) {
          globalLogs = await nRes.json();
          renderMacros();
          renderLogsHistory();
          updateLogFormWithSelectedDate();
        }
        if (mRes.ok) renderMetrics(await mRes.json());
        if (rRes.ok) renderRecipes(await rRes.json());

      } catch (e) {
        console.error('Failed to fetch health data', e);
        document.getElementById('macros-overview').innerHTML = `
          <div class="col-span-3 p-6 border-2 border-[var(--pigment-red)] bg-[#fdf5f4] text-[var(--pigment-red)] font-mono text-xs uppercase tracking-widest">
            ERR: Connection to localhost:3000 refused.
          </div>
        `;
      }
    }

    function toggleTargetsForm() {
      const container = document.getElementById('targets-form-container');
      container.classList.toggle('hidden');
    }

    function updateLogFormWithSelectedDate() {
      const selectedDate = document.getElementById('log-date').value;
      const log = globalLogs.find(l => l.log_date === selectedDate);
      if (log) {
        document.getElementById('log-calories').value = log.calories;
        document.getElementById('log-protein').value = log.protein;
        document.getElementById('log-carbs').value = log.carbs;
        document.getElementById('log-fat').value = log.fat;
        document.getElementById('log-fiber').value = log.fiber;
        document.getElementById('log-water').value = log.water;
        document.getElementById('log-notes').value = log.notes || '';
      } else {
        document.getElementById('log-calories').value = 0;
        document.getElementById('log-protein').value = 0;
        document.getElementById('log-carbs').value = 0;
        document.getElementById('log-fat').value = 0;
        document.getElementById('log-fiber').value = 0;
        document.getElementById('log-water').value = 0;
        document.getElementById('log-notes').value = '';
      }
    }

    function renderMacros() {
      const todayLogData = globalLogs.find(l => l.log_date === todayDateStr) || { calories: 0, protein: 0, water: 0 };
      const calProgress = globalTargets.calorie_target > 0 ? Math.round((todayLogData.calories / globalTargets.calorie_target) * 100) : 0;
      const proProgress = globalTargets.protein_target > 0 ? Math.round((todayLogData.protein / globalTargets.protein_target) * 100) : 0;
      const watProgress = globalTargets.water_target > 0 ? Math.round((todayLogData.water / globalTargets.water_target) * 100) : 0;

      document.getElementById('macros-overview').innerHTML = `
        <div class="brutal-interactive p-6 flex flex-col gap-2 group cursor-default">
          <div class="flex justify-between items-baseline mb-2">
            <span class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] group-hover:text-[var(--pigment-yellow)] transition-colors">Calories</span>
            <span class="font-mono text-xs font-bold text-[#31353c]">${todayLogData.calories} / ${globalTargets.calorie_target}</span>
          </div>
          <div class="text-4xl font-black tracking-tighter mb-4 text-[#31353c]">${calProgress}%</div>
          <div class="w-full h-2 border-2 border-[#31353c] bg-[#f9fafb] overflow-hidden">
            <div class="bg-[var(--pigment-yellow)] h-full transition-all" style="width: ${Math.min(100, Math.max(0, calProgress))}%"></div>
          </div>
        </div>

        <div class="brutal-interactive p-6 flex flex-col gap-2 group cursor-default">
          <div class="flex justify-between items-baseline mb-2">
            <span class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] group-hover:text-[var(--pigment-red)] transition-colors">Protein</span>
            <span class="font-mono text-xs font-bold text-[#31353c]">${todayLogData.protein}g / ${globalTargets.protein_target}g</span>
          </div>
          <div class="text-4xl font-black tracking-tighter mb-4 text-[#31353c]">${proProgress}%</div>
          <div class="w-full h-2 border-2 border-[#31353c] bg-[#f9fafb] overflow-hidden">
            <div class="bg-[var(--pigment-red)] h-full transition-all" style="width: ${Math.min(100, Math.max(0, proProgress))}%"></div>
          </div>
        </div>

        <div class="brutal-interactive p-6 flex flex-col gap-2 group cursor-default">
          <div class="flex justify-between items-baseline mb-2">
            <span class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] group-hover:text-[var(--pigment-blue)] transition-colors">Water</span>
            <span class="font-mono text-xs font-bold text-[#31353c]">${todayLogData.water}L / ${globalTargets.water_target}L</span>
          </div>
          <div class="text-4xl font-black tracking-tighter mb-4 text-[#31353c]">${watProgress}%</div>
          <div class="w-full h-2 border-2 border-[#31353c] bg-[#f9fafb] overflow-hidden">
            <div class="bg-[var(--pigment-blue)] h-full transition-all" style="width: ${Math.min(100, Math.max(0, watProgress))}%"></div>
          </div>
        </div>
      `;
    }

    function renderMetrics(metrics) {
      const tbody = document.getElementById('metrics-table-body');
      if (metrics.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-[#9ca3af] text-center pt-4 border-t-2 border-dashed border-[#e8eceb]">NO BODY METRICS LOGGED.</td></tr>';
      } else {
        tbody.innerHTML = metrics.slice(0, 7).map(m => `
          <tr class="border-t-2 border-dashed border-[#e8eceb] hover:bg-[#f9fafb] transition-colors">
            <td class="py-4 text-[#9ca3af]">${formatDate(m.measurement_date)}</td>
            <td class="py-4 font-bold text-[#31353c]">${m.weight}</td>
            <td class="py-4 font-bold text-[#31353c] text-right">${m.body_fat !== null && m.body_fat !== undefined ? `${m.body_fat}%` : '-'}</td>
          </tr>
        `).join('');
      }
    }

    function renderRecipes(recipes) {
      const container = document.getElementById('recipes-list');
      if (recipes.length === 0) {
        container.innerHTML = '<p class="text-[#9ca3af] font-mono text-[10px] uppercase tracking-widest pt-2">No recipes added yet.</p>';
      } else {
        container.innerHTML = recipes.map(r => `
          <div class="py-4 border-b-2 border-dashed border-[#e8eceb] hover:bg-[#f9fafb] transition-colors px-2 -mx-2">
            <h3 class="font-bold text-sm text-[#31353c] uppercase tracking-tight mb-2">${r.name}</h3>
            <div class="flex gap-4 font-mono text-[10px] uppercase tracking-widest text-[#9ca3af]">
              <span class="text-[#31353c] font-bold">${r.calories} KCAL</span>
              <span>${r.protein}G P</span>
              <span>${r.carbs}G C</span>
              <span>${r.fat}G F</span>
            </div>
          </div>
        `).join('');
      }
    }

    function renderLogsHistory() {
      const container = document.getElementById('logs-history');
      if (globalLogs.length === 0) {
        container.innerHTML = '<p class="text-[#9ca3af] font-mono text-[10px] uppercase tracking-widest">No history recorded.</p>';
      } else {
        container.innerHTML = globalLogs.slice(0, 10).map(log => `
          <div class="py-3 border-b-2 border-dashed border-[#e8eceb] last:border-0 flex justify-between items-center hover:bg-white transition-colors px-2 -mx-2">
            <span class="font-bold text-sm text-[#31353c]">${formatDate(log.log_date)}</span>
            <span class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] font-bold">
              <span class="text-[#31353c]">${log.calories} KCAL</span> • ${log.protein}G P
            </span>
          </div>
        `).join('');
      }
    }

    async function handleUpdateTargets(e) {
      e.preventDefault();
      const payload = {
        calorie_target: Number(document.getElementById('target-calories').value),
        protein_target: Number(document.getElementById('target-protein').value),
        water_target: Number(document.getElementById('target-water').value)
      };
      try {
        await fetch('http://localhost:3000/api/health/targets', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        toggleTargetsForm();
        fetchData();
      } catch (e) { console.error(e); }
    }

    async function handleSaveLog(e) {
      e.preventDefault();
      const payload = {
        log_date: document.getElementById('log-date').value,
        calories: Number(document.getElementById('log-calories').value),
        protein: Number(document.getElementById('log-protein').value),
        carbs: Number(document.getElementById('log-carbs').value),
        fat: Number(document.getElementById('log-fat').value),
        fiber: Number(document.getElementById('log-fiber').value),
        water: Number(document.getElementById('log-water').value),
        notes: document.getElementById('log-notes').value
      };
      try {
        await fetch('http://localhost:3000/api/health/nutrition', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        fetchData();
      } catch (e) { console.error(e); }
    }

    async function handleSaveMetric(e) {
      e.preventDefault();
      const payload = {
        measurement_date: document.getElementById('metric-date').value,
        weight: Number(document.getElementById('metric-weight').value),
        body_fat: document.getElementById('metric-fat').value ? Number(document.getElementById('metric-fat').value) : null
      };
      try {
        await fetch('http://localhost:3000/api/health/metrics', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        document.getElementById('metric-weight').value = '';
        document.getElementById('metric-fat').value = '';
        fetchData();
      } catch (e) { console.error(e); }
    }

    async function handleCreateRecipe(e) {
      e.preventDefault();
      const payload = {
        name: document.getElementById('recipe-name').value,
        calories: Number(document.getElementById('recipe-cal').value || 0),
        protein: Number(document.getElementById('recipe-pro').value || 0),
        carbs: Number(document.getElementById('recipe-car').value || 0),
        fat: Number(document.getElementById('recipe-fat').value || 0)
      };
      try {
        await fetch('http://localhost:3000/api/health/recipes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        document.getElementById('recipe-form').reset();
        fetchData();
      } catch (e) { console.error(e); }
    }
  </script>
</body>

</html>
