    /* =========================================
       1. LIGHT MODE VARIABLES (Raw Concrete)
       ========================================= */
    :root {
      --bg-base: #dfdfdf;       /* User specified light base */
      --bg-surface: #ebebeb;    /* Slightly lighter for inputs/cards */
      --text-main: #1a1a1a;     /* Deep contrast text */
      --text-muted: #5a5a5a;    /* Mid-grey for secondary text */
      --border-main: #1a1a1a;   /* Harsh borders */
      --border-muted: #8a8a8a;  /* Subtle borders */
      --shadow-color: #1a1a1a;  /* Solid shadow */
      
      /* Pigments (Consistent across both modes) */
      --pigment-yellow: #c8a97e;
      --pigment-red: #c26e60;
      --pigment-purple: #8d7a8b;
      --pigment-blue: #6e8ca0;
    }

    /* =========================================
       2. DARK MODE VARIABLES (Matte Graphite)
       ========================================= */
    .dark {
      --bg-base: #222222;       /* User specified dark base */
      --bg-surface: #2c2c2c;    /* Slightly lighter for inputs/cards */
      --text-main: #ececec;     /* Crisp off-white text */
      --text-muted: #a3a3a3;    /* Mid-light grey for secondary */
      --border-main: #ececec;   /* Harsh light borders */
      --border-muted: #686868;  /* Subtle borders */
      --shadow-color: #111111;  /* Deep shadow to stand out against #383838 */
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .font-mono { font-family: 'JetBrains Mono', monospace; }

    /* =========================================
       3. COMPONENT STYLES (Variable-Driven)
       ========================================= */
    .brutal-block {
      border: 2px solid var(--border-main);
      background-color: var(--bg-base);
    }

    .brutal-interactive {
      border: 2px solid var(--border-main);
      background-color: var(--bg-base);
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .brutal-interactive:hover {
      transform: translate(-4px, -4px);
      box-shadow: 4px 4px 0px 0px var(--shadow-color);
      background-color: var(--bg-surface); 
    }

    .brutal-input {
      width: 100%;
      border: 2px solid var(--border-muted);
      background-color: var(--bg-surface);
      color: var(--text-main);
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      outline: none;
      transition: all 0.2s;
    }
    .brutal-input:focus {
      border-color: var(--border-main);
      background-color: var(--bg-base);
    }
    .brutal-input::placeholder {
      color: var(--text-muted);
    }

    /* =========================================
       4. DYNAMIC SVG ARROWS FOR SELECTS
       ========================================= */
    /* Light mode arrow (#1a1a1a) */
    select.brutal-input {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231a1a1a%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 1rem top 50%;
      background-size: 0.65rem auto;
      cursor: pointer;
    }
    /* Dark mode arrow (#ececec) */
    .dark select.brutal-input {
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ececec%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
    }

            <script>
              lucide.createIcons();
              document.getElementById('current-date-display').textContent = new Date().toLocaleDateString('en-GB').replace(/\//g, '.');

              const urlParams = new URLSearchParams(window.location.search);
              const skillId = urlParams.get('id');

              let currentFilter = 'Active';
              const filters = ['Wishlist', 'Planned', 'Active', 'Paused', 'Completed', 'Dropped'];

              // Formatting utility
              function formatDate(dateStr) {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-GB').replace(/\//g, '.');
              }

              document.addEventListener('DOMContentLoaded', async () => {
                if (skillId) {
                  document.getElementById('detail-view').classList.remove('hidden');
                  await loadDetailView();
                } else {
                  document.getElementById('list-view').classList.remove('hidden');
                  await loadListView();
                }
              });

              // --- LIST VIEW LOGIC ---

              async function loadListView() {
                await fetchLifeAreas();
                renderTabs();
                await fetchSkills(currentFilter);

                if (window.HBT_SETTINGS) {
                  document.getElementById('skill-status').value = window.HBT_SETTINGS.default_skill_status || 'Wishlist';
                  document.getElementById('skill-schedule').value = window.HBT_SETTINGS.default_skill_schedule || 'Flexible';
                }

                document.getElementById('new-skill-form').addEventListener('submit', handleCreateSkill);
              }

              function toggleNewSkillForm() {
                const container = document.getElementById('new-skill-form-container');
                const btn = document.getElementById('new-skill-btn');
                if (container.classList.contains('hidden')) {
                  container.classList.remove('hidden');
                  btn.innerHTML = 'Cancel';
                } else {
                  container.classList.add('hidden');
                  btn.innerHTML = 'New Skill';
                }
              }

              async function fetchLifeAreas() {
                try {
                  const res = await fetch('http://localhost:3000/api/skills/life-areas');
                  if (res.ok) {
                    const areas = await res.json();
                    const select = document.getElementById('skill-life-area');
                    areas.forEach(a => {
                      select.insertAdjacentHTML('beforeend', `<option value="${a.id}">${a.name}</option>`);
                    });
                  }
                } catch (e) {
                  console.error(e);
                }
              }

              function renderTabs() {
                const container = document.getElementById('tabs-container');
                container.innerHTML = filters.map(f => {
                  const isActive = currentFilter === f;
                  return `
          <button
            onclick="setFilter('${f}')"
            class="font-mono text-[10px] uppercase tracking-widest font-bold px-4 py-3 border-2 transition-all whitespace-nowrap ${isActive
                      ? 'bg-[var(--pigment-yellow)] text-[var(--text-main)] border-[var(--pigment-yellow)] translate-y-[-2px] shadow-[2px_2px_0px_0px_var(--shadow-color)]'
                      : 'bg-transparent text-[var(--text-muted)] border-transparent hover:border-[var(--border-muted)]'
                    }"
          >
            ${f}
          </button>
        `;
                }).join('');
              }

              async function setFilter(f) {
                currentFilter = f;
                renderTabs();
                await fetchSkills(f);
              }

              async function fetchSkills(status) {
                const container = document.getElementById('skills-grid');
                container.innerHTML = `
        <div class="col-span-3 flex items-center gap-3 text-[var(--text-muted)] font-mono text-sm uppercase tracking-widest animate-pulse py-8">
          <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Fetching Skills...
        </div>
      `;
                lucide.createIcons();

                try {
                  const res = await fetch(`http://localhost:3000/api/skills?status=${status}`, { cache: 'no-store' });
                  if (res.ok) {
                    const skills = await res.json();
                    if (skills.length === 0) {
                      container.innerHTML = `
              <div class="col-span-3 py-12 border-2 border-dashed border-[var(--border-muted)] flex flex-col items-center justify-center text-[var(--text-muted)]">
                <i data-lucide="folder-open" class="w-8 h-8 mb-4 opacity-50"></i>
                <p class="font-mono text-xs uppercase tracking-widest">No ${status.toLowerCase()} skills found.</p>
              </div>
            `;
                      lucide.createIcons();
                      return;
                    }

                    container.innerHTML = skills.map(skill => {
                      const completedItems = skill.checklist_stats?.completed || 0;
                      const totalItems = skill.checklist_stats?.total || 0;

                      return `
              <div class="brutal-interactive p-6 flex flex-col justify-between cursor-pointer bg-[var(--bg-base)] group h-[220px]" onclick="window.location.href='?id=${skill.id}'">
                <div>
                  <h3 class="font-bold text-2xl tracking-tighter uppercase mb-4 group-hover:underline">${skill.name}</h3>
                  <p class="font-mono text-[10px] uppercase tracking-widest text-[var(--text-muted)] font-bold">
                    <span class="text-[var(--text-main)]">${skill.category || 'Uncategorized'}</span> /// ${skill.life_area_name || 'No Life Area'}
                  </p>
                </div>
                
                <div class="mt-6">
                  <div class="flex justify-between font-mono text-[10px] uppercase tracking-widest text-[var(--text-main)] font-bold mb-2">
                    <span>${skill.progress || 0}%</span>
                    <span>${completedItems}/${totalItems}</span>
                  </div>
                  <div class="w-full h-2 border-2 border-[var(--border-main)] bg-[var(--bg-surface)] overflow-hidden">
                    <div class="bg-[var(--pigment-yellow)] h-full transition-all" style="width: ${Math.min(100, Math.max(0, skill.progress || 0))}%"></div>
                  </div>
                </div>
              </div>
            `;
                    }).join('');
                  }
                } catch (e) {
                  console.error(e);
                  container.innerHTML = `
          <div class="col-span-3 p-6 border-2 border-[var(--pigment-red)] bg-[var(--bg-surface)] text-[var(--pigment-red)] font-mono text-xs uppercase tracking-widest">
            ERR: Connection to localhost:3000 refused.
          </div>
        `;
                }
              }

              async function handleCreateSkill(e) {
                e.preventDefault();
                const payload = {
                  name: document.getElementById('skill-name').value,
                  category: document.getElementById('skill-category').value,
                  status: document.getElementById('skill-status').value,
                  schedule_type: document.getElementById('skill-schedule').value,
                  target_date: document.getElementById('skill-target-date').value,
                  life_area_id: document.getElementById('skill-life-area').value,
                  why_learning: document.getElementById('skill-why').value
                };

                try {
                  const res = await fetch('http://localhost:3000/api/skills', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                  });
                  if (res.ok) {
                    toggleNewSkillForm();
                    document.getElementById('new-skill-form').reset();
                    fetchSkills(currentFilter);
                  }
                } catch (e) {
                  console.error(e);
                }
              }

              // --- DETAIL VIEW LOGIC ---

              async function loadDetailView() {
                try {
                  const res = await fetch(`http://localhost:3000/api/skills/${skillId}`);
                  if (res.ok) {
                    const skill = await res.json();
                    renderDetailView(skill);
                  } else {
                    document.getElementById('detail-name').textContent = "ERROR LOADING SKILL";
                  }
                } catch (e) {
                  console.error(e);
                  document.getElementById('detail-name').textContent = "ERROR LOADING SKILL";
                }

                document.getElementById('add-item-form').addEventListener('submit', handleAddItem);
                document.getElementById('log-session-form').addEventListener('submit', handleAddSession);
              }

              function renderDetailView(skill) {
                document.title = `${skill.name} | Skills`;
                document.getElementById('detail-name').textContent = skill.name;
                document.getElementById('detail-category').textContent = skill.category || 'UNCATEGORIZED';
                document.getElementById('detail-life-area').textContent = skill.life_area_name || 'NO LIFE AREA';
                document.getElementById('detail-status-select').value = skill.status;

                let datesHtml = '';
                if (skill.started_at) datesHtml += `<span class="flex items-center gap-1"><i data-lucide="play-circle" class="w-3 h-3"></i> ${formatDate(skill.started_at)}</span>`;
                if (skill.completed_at) datesHtml += `<span class="flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3"></i> ${formatDate(skill.completed_at)}</span>`;
                datesHtml += `<span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i> ${skill.schedule_type}</span>`;
                document.getElementById('detail-dates').innerHTML = datesHtml;
                lucide.createIcons();

                const totalItems = skill.checklists?.reduce((acc, c) => acc + c.items.length, 0) || 0;
                const completedItems = skill.checklists?.reduce((acc, c) => acc + c.items.filter(i => i.completed).length, 0) || 0;
                const progress = totalItems === 0 ? 0 : Math.round((completedItems / totalItems) * 100);

                document.getElementById('detail-progress-text').textContent = `${progress}%`;
                document.getElementById('detail-progress-fraction').textContent = `${completedItems} / ${totalItems} COMPLETED`;
                document.getElementById('detail-progress-bar').innerHTML = `
        <div class="h-full bg-[var(--pigment-yellow)] transition-all duration-500" style="width: ${progress}%"></div>
      `;

                // Checklists
                const clContainer = document.getElementById('detail-checklists');
                if (!skill.checklists || skill.checklists.length === 0) {
                  clContainer.innerHTML = `
          <div class="py-12 border-2 border-dashed border-[var(--border-muted)] flex flex-col items-center justify-center text-[var(--text-muted)] bg-[var(--bg-surface)]">
            <i data-lucide="list-todo" class="w-8 h-8 mb-4 opacity-50"></i>
            <p class="font-mono text-xs uppercase tracking-widest">No checklists available.</p>
          </div>
        `;
                } else {
                  clContainer.innerHTML = skill.checklists.map((cl, index) => `
          <div class="brutal-block p-6 bg-[var(--bg-base)]">
            <h3 class="font-mono text-[10px] uppercase tracking-widest text-[var(--text-muted)] font-bold border-b-2 border-[var(--border-main)] pb-2 mb-4">${cl.title}</h3>
            <div class="flex flex-col border-l-2 border-[var(--border-main)] pl-4 gap-1">
              ${cl.items.map(item => {
                    const timeStr = item.scheduled_time ? `${formatDate(item.scheduled_date) || ''} ${item.scheduled_time}` : (formatDate(item.scheduled_date) || '');
                    return `
                  <label class="group flex items-start gap-4 p-4 border-2 border-transparent hover:border-[var(--border-muted)] cursor-pointer transition-colors bg-[var(--bg-base)]">
                    <div class="relative flex items-center justify-center mt-0.5">
                      <input type="checkbox" class="peer sr-only" ${item.completed ? 'checked' : ''} onchange="toggleChecklistItem(${item.id}, ${item.completed})" />
                      <div class="w-6 h-6 border-2 flex items-center justify-center transition-colors duration-200 ${item.completed ? 'bg-[var(--pigment-yellow)] border-[var(--pigment-yellow)]' : 'border-[var(--border-main)] bg-transparent group-hover:bg-[var(--bg-surface)]'}">
                        <i data-lucide="check" class="w-4 h-4 text-[var(--text-main)] transition-opacity ${item.completed ? 'opacity-100' : 'opacity-0'}"></i>
                      </div>
                    </div>
                    <div class="flex flex-col flex-1">
                      ${timeStr ? `<span class="font-mono text-[10px] uppercase tracking-widest text-[var(--text-muted)] mb-1">${timeStr}</span>` : ''}
                      <span class="text-xl md:text-2xl font-bold tracking-tight transition-all duration-200 ${item.completed ? 'text-[var(--text-muted)] line-through' : 'text-[var(--text-main)]'}">
                        ${item.title}
                      </span>
                    </div>
                  </label>
                `;
                  }).join('')}
            </div>
          </div>
        `).join('');
                }

                // Sessions
                const sessionsContainer = document.getElementById('detail-sessions');
                if (!skill.sessions || skill.sessions.length === 0) {
                  sessionsContainer.innerHTML = '<p class="text-[var(--text-muted)] font-mono text-[10px] uppercase tracking-widest py-2">No sessions logged.</p>';
                } else {
                  sessionsContainer.innerHTML = skill.sessions.map(s => `
          <div class="border-b-2 border-dashed border-[var(--border-muted)] last:border-0 pb-4 last:pb-0 pt-4 first:pt-0">
            <div class="flex justify-between items-center mb-2">
              <span class="font-bold text-sm text-[var(--text-main)] uppercase tracking-tight">${s.duration_minutes} MIN</span>
              <span class="font-mono text-[10px] uppercase tracking-widest text-[var(--text-muted)]">${formatDate(s.session_date)}</span>
            </div>
            ${s.notes ? `<p class="text-[var(--text-main)] text-xs font-mono tracking-wide mt-2 border-l-2 border-[var(--border-main)] pl-2">${s.notes}</p>` : ''}
          </div>
        `).join('');
                }

                // Why learning
                if (skill.why_learning) {
                  document.getElementById('why-learning-container').classList.remove('hidden');
                  document.getElementById('why-learning-text').textContent = skill.why_learning;
                }

                lucide.createIcons();
              }

              async function updateSkillStatus(status) {
                try {
                  await fetch(`http://localhost:3000/api/skills/${skillId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                  });
                  loadDetailView();
                } catch (e) { console.error(e); }
              }

              async function toggleChecklistItem(itemId, isCompleted) {
                try {
                  await fetch(`http://localhost:3000/api/skills/${skillId}/checklists/items/${itemId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: !isCompleted })
                  });
                  loadDetailView();
                } catch (e) { console.error(e); }
              }

              async function handleAddItem(e) {
                e.preventDefault();
                try {
                  await fetch(`http://localhost:3000/api/skills/${skillId}/checklists`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      checklist_title: document.getElementById('new-cl-section').value,
                      item_title: document.getElementById('new-cl-title').value,
                      scheduled_date: document.getElementById('new-cl-date').value || null,
                      scheduled_time: document.getElementById('new-cl-time').value || null
                    })
                  });
                  document.getElementById('new-cl-title').value = '';
                  loadDetailView();
                } catch (e) { console.error(e); }
              }

              async function handleAddSession(e) {
                e.preventDefault();
                try {
                  await fetch(`http://localhost:3000/api/skills/${skillId}/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      duration_minutes: parseInt(document.getElementById('session-duration').value),
                      notes: document.getElementById('session-notes').value
                    })
                  });
                  document.getElementById('log-session-form').reset();
                  loadDetailView();
                } catch (e) { console.error(e); }
              }

              async function deleteSkill() {
                if (!confirm('Are you sure you want to delete this skill?')) return;
                try {
                  const res = await fetch(`http://localhost:3000/api/skills/${skillId}`, {
                    method: 'DELETE'
                  });
                  if (res.ok) {
                    window.location.href = window.location.pathname;
                  }
                } catch (e) { console.error(e); }
              }
            </script>
          </body>

          </html>
