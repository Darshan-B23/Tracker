<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness | Personal OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap');

    :root {
      --bg-base: #ffffff;
      --text-main: #31353c;
      --border-light: #e8eceb;
      --shadow-color: #31353c;
      --pigment-yellow: #c8a97e;
      --pigment-red: #c26e60;
      --pigment-purple: #8d7a8b;
      --pigment-blue: #6e8ca0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .brutal-block {
      border: 2px solid var(--text-main);
      background-color: var(--bg-base);
    }

    .brutal-interactive {
      border: 2px solid var(--text-main);
      background-color: var(--bg-base);
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .brutal-interactive:hover {
      transform: translate(-4px, -4px);
      box-shadow: 4px 4px 0px 0px var(--shadow-color);
    }

    .brutal-input {
      width: 100%;
      border: 2px solid var(--text-main);
      background-color: #f9fafb;
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      outline: none;
      transition: background-color 0.2s;
    }

    .brutal-input:focus {
      background-color: var(--bg-base);
    }

    select.brutal-input {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2331353c%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 1rem top 50%;
      background-size: 0.65rem auto;
      cursor: pointer;
    }

    .tab-btn {
      opacity: 0.5;
      border-bottom: 4px solid transparent;
    }

    .tab-btn.active {
      opacity: 1;
      border-bottom: 4px solid var(--text-main);
    }
  </style>
</head>

<body class="selection:bg-[#e8eceb] p-4 sm:p-8 md:p-12 lg:p-16 flex justify-center">

  <div class="w-full max-w-6xl relative">

    <!-- System Coordinates / Metadata -->
    <div class="flex justify-between items-start mb-8 text-[10px] font-mono uppercase tracking-widest text-[#9ca3af] relative z-50">
      <div class="flex flex-col gap-1">
        <span>SYS.FITNESS // OS</span>
        <span id="current-date-display">--.--.--</span>
      </div>

      <!-- Navigation Dropdown -->
      <div class="relative group z-50">
        <button
          class="p-2 flex items-center justify-center text-[#31353c] hover:bg-[#31353c] hover:text-white transition-colors border-2 border-[#31353c] bg-white cursor-pointer"
          aria-label="Menu">
          <i data-lucide="menu" class="w-4 h-4"></i>
        </button>
        <div
          class="absolute right-0 mt-2 w-48 bg-white border-2 border-[#31353c] shadow-[4px_4px_0px_0px_#31353c] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 flex flex-col z-50 text-left">
          <a href="/dashboard.html"
            class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#6e8ca0] transition-colors flex items-center gap-2 normal-case"><i
              data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</a>
          <a href="/goals.html"
            class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#8d7a8b] transition-colors flex items-center gap-2 normal-case"><i
              data-lucide="target" class="w-4 h-4"></i> Goals</a>
          <a href="/projects.html"
            class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#c26e60] transition-colors flex items-center gap-2 normal-case"><i
              data-lucide="folder" class="w-4 h-4"></i> Projects</a>
          <a href="/skills.html"
            class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#c8a97e] transition-colors flex items-center gap-2 normal-case"><i
              data-lucide="brain" class="w-4 h-4"></i> Skills</a>
          <a href="/health.html"
            class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#c8a97e] transition-colors flex items-center gap-2 normal-case"><i
              data-lucide="activity" class="w-4 h-4"></i> Health</a>
          <a href="/fitness.html"
            class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#6e8ca0] transition-colors flex items-center gap-2 normal-case"><i
              data-lucide="dumbbell" class="w-4 h-4"></i> Fitness</a>
          <a href="/analytics.html"
            class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] transition-colors flex items-center gap-2 normal-case"><i
              data-lucide="bar-chart-2" class="w-4 h-4"></i> Analytics</a>
          <a href="/settings.html"
            class="px-4 py-3 text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] transition-colors flex items-center gap-2 normal-case"><i
              data-lucide="settings" class="w-4 h-4"></i> Settings</a>
        </div>
      </div>
    </div>

    <header class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6 border-b-4 border-[#31353c] pb-8 mt-4 md:mt-0">
      <h1 class="text-5xl md:text-7xl font-black tracking-tighter uppercase leading-none">Fitness</h1>
    </header>

    <!-- Tabs -->
    <div class="flex gap-6 mb-12 border-b-2 border-[#e8eceb]">
      <button class="tab-btn active pb-2 font-mono text-sm uppercase tracking-widest font-bold"
        onclick="switchTab('dashboard')">Dashboard</button>
      <button class="tab-btn pb-2 font-mono text-sm uppercase tracking-widest font-bold"
        onclick="switchTab('builder')">Builder</button>
      <button class="tab-btn pb-2 font-mono text-sm uppercase tracking-widest font-bold"
        onclick="switchTab('progress')">Progress</button>
    </div>

    <!-- TAB: Dashboard -->
    <div id="tab-dashboard" class="tab-content">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <!-- Today's Workout -->
        <div class="lg:col-span-2">
          <div class="flex items-center gap-3 mb-6">
            <div class="w-3 h-3 bg-[var(--pigment-blue)] border border-[#31353c]"></div>
            <h2 class="text-xl font-bold tracking-tighter uppercase">Today's Workout</h2>
          </div>
          <div id="today-workout-container" class="brutal-block p-8 bg-[#f9fafb]">
            <p class="font-mono text-xs uppercase tracking-widest animate-pulse">Loading...</p>
          </div>

          <!-- Active Session View (Hidden by default) -->
          <div id="active-session-container" class="hidden mt-8">
            <div class="flex items-center gap-3 mb-6">
              <div class="w-3 h-3 bg-[var(--pigment-red)] border border-[#31353c]"></div>
              <h2 class="text-xl font-bold tracking-tighter uppercase">Active Session</h2>
            </div>
            <div id="active-session-content" class="flex flex-col gap-6"></div>
            <div class="mt-8 flex justify-end">
              <button onclick="completeSession()"
                class="brutal-interactive px-8 py-4 font-mono text-sm uppercase tracking-widest font-bold bg-[#31353c] text-white hover:bg-black">Complete
                Workout</button>
            </div>
          </div>
        </div>

        <!-- History -->
        <div>
          <div class="flex items-center gap-3 mb-6">
            <div class="w-3 h-3 bg-[#e8eceb] border border-[#31353c]"></div>
            <h2 class="text-xl font-bold tracking-tighter uppercase">History</h2>
          </div>
          <div id="history-container" class="flex flex-col gap-4">
            <p class="font-mono text-xs uppercase tracking-widest text-[#9ca3af]">Loading...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: Builder -->
    <div id="tab-builder" class="tab-content hidden">
      <div class="flex flex-col gap-12">
        <!-- Templates List -->
        <div>
          <div class="relative flex items-center mb-6">
            <div class="flex items-center gap-3">
              <div class="w-3 h-3 bg-[var(--pigment-blue)] border border-[#31353c]"></div>
              <h2 class="text-xl font-bold tracking-tighter uppercase">Templates</h2>
            </div>
            <button onclick="toggleTemplateForm()"
              class="brutal-interactive absolute right-0 px-4 py-2 font-mono text-[10px] uppercase tracking-widest font-bold bg-[#31353c] text-white transition-colors">Create
              New</button>
          </div>
          <div id="templates-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- Create Template Form -->
        <div id="create-template-form" class="hidden brutal-block p-8 bg-[#f9fafb]">
          <h3 class="text-2xl font-bold tracking-tighter uppercase mb-6">New Template</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
              <label class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] block mb-2">Name</label>
              <input type="text" id="tpl-new-name" class="brutal-input" placeholder="PUSH PULL LEGS">
            </div>
            <div>
              <label
                class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] block mb-2">Description</label>
              <input type="text" id="tpl-new-desc" class="brutal-input" placeholder="OPTIONAL">
            </div>
          </div>

          <h4 class="font-mono text-sm uppercase tracking-widest font-bold mb-4">Workout Days</h4>
          <div id="tpl-days-container" class="flex flex-col gap-4 mb-6">
            <!-- Dynamically added days -->
          </div>
          <button onclick="addDayToTemplate()"
            class="brutal-interactive px-4 py-2 font-mono text-[10px] uppercase tracking-widest font-bold bg-white text-[#31353c] border-dashed mb-8">+
            Add Day</button>

          <div class="flex justify-end">
            <button onclick="saveTemplate()"
              class="brutal-interactive px-6 py-3 font-mono text-xs uppercase tracking-widest font-bold bg-[#31353c] text-white">Save
              Template</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: Progress -->
    <div id="tab-progress" class="tab-content hidden">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
        <div>
          <div class="flex items-center gap-3 mb-6">
            <div class="w-3 h-3 bg-[var(--pigment-blue)] border border-[#31353c]"></div>
            <h2 class="text-xl font-bold tracking-tighter uppercase">Personal Records</h2>
          </div>
          <div id="prs-list" class="flex flex-col border-t-2 border-[#31353c]"></div>
        </div>
        <div>
          <!-- Placeholder for additional charts or analytics -->
          <div class="flex items-center gap-3 mb-6">
            <div class="w-3 h-3 bg-[#e8eceb] border border-[#31353c]"></div>
            <h2 class="text-xl font-bold tracking-tighter uppercase">Statistics</h2>
          </div>
          <p class="font-mono text-xs text-[#9ca3af] uppercase tracking-widest">Analytics visualizations can be found in
            the Analytics tab.</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    lucide.createIcons();

    // App State
    let activeSessionId = null;
    let exerciseDictionary = [];

    // Builder State
    let newTemplateDays = [];
    let editingTemplateId = null;

    document.addEventListener('DOMContentLoaded', () => {
      fetchData();
      fetchDictionary();
    });

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));

      event.target.classList.add('active');
      document.getElementById('tab-' + tabId).classList.remove('hidden');
    }

    async function fetchData() {
      try {
        const [todayRes, historyRes, prRes, tplRes] = await Promise.all([
          fetch('/api/fitness/today'),
          fetch('/api/fitness/history'),
          fetch('/api/fitness/pr'),
          fetch('/api/fitness/templates')
        ]);

        if (todayRes.ok) renderToday(await todayRes.json());
        if (historyRes.ok) renderHistory(await historyRes.json());
        if (prRes.ok) renderPRs(await prRes.json());
        if (tplRes.ok) renderTemplates(await tplRes.json());
      } catch (e) {
        console.error(e);
      }
    }

    async function fetchDictionary() {
      try {
        const res = await fetch('/api/fitness/exercises/dictionary');
        if (res.ok) exerciseDictionary = await res.json();
      } catch (e) { console.error(e); }
    }

    function renderToday(data) {
      const container = document.getElementById('today-workout-container');
      if (!data) {
        container.innerHTML = `<p class="font-mono text-xs uppercase tracking-widest text-[#9ca3af]">No active template.</p>`;
        return;
      }

      if (data.is_rest_day) {
        container.innerHTML = `
          <div class="flex flex-col items-center justify-center py-8">
             <i data-lucide="coffee" class="w-12 h-12 mb-4 text-[#9ca3af]"></i>
             <h3 class="text-2xl font-black uppercase tracking-tighter">Rest Day</h3>
             <p class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] mt-2">Active Template: ${data.template_name}</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      if (data.session && !data.session.completed_at) {
        // Active session exists
        container.innerHTML = `<div class="flex justify-between items-center">
          <div>
            <p class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] mb-1">${data.template_name} &bull; ${data.streak_count || 0} Day Streak</p>
            <h3 class="text-2xl font-black uppercase tracking-tighter">Session in Progress</h3>
          </div>
          <p class="font-mono text-[10px] uppercase tracking-widest text-[var(--pigment-red)] font-bold animate-pulse">RECORDING</p>
        </div>`;
        activeSessionId = data.session.id;
        document.getElementById('active-session-container').classList.remove('hidden');
        loadActiveSession(data.workout_day.exercises);
      } else if (data.session && data.session.completed_at) {
        container.innerHTML = `
          <div class="flex flex-col items-center justify-center py-8">
             <i data-lucide="check-circle" class="w-12 h-12 mb-4 text-[#31353c]"></i>
             <h3 class="text-2xl font-black uppercase tracking-tighter">Workout Complete</h3>
             <p class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] mt-2"> ${data.streak_count || 0} Day Streak &bull; Great job today.</p>
          </div>
        `;
        lucide.createIcons();
        document.getElementById('active-session-container').classList.add('hidden');
      } else {
        // No session yet
        container.innerHTML = `
          <div class="flex justify-between items-end">
            <div>
              <p class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] mb-1">${data.template_name} &bull; ${data.streak_count || 0} Day Streak</p>
              <h3 class="text-4xl font-black uppercase tracking-tighter">${data.workout_day.name}</h3>
              <p class="font-mono text-xs uppercase tracking-widest text-[#31353c] mt-2">${data.workout_day.exercises.length} Exercises Planned</p>
            </div>
            <button onclick="startSession(${data.template_id}, ${data.workout_day.id})" class="brutal-interactive px-6 py-3 font-mono text-xs uppercase tracking-widest font-bold bg-[var(--pigment-blue)] text-white hover:bg-[#31353c]">Start</button>
          </div>
        `;
      }
    }

    async function startSession(templateId, dayId) {
      try {
        const res = await fetch('/api/fitness/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ template_id: templateId, workout_day_id: dayId })
        });
        if (res.ok) {
          fetchData();
        }
      } catch (e) { console.error(e); }
    }

    async function loadActiveSession(plannedExercises) {
      const container = document.getElementById('active-session-content');
      container.innerHTML = '';

      // Also fetch what has been logged
      let logs = [];
      try {
        const res = await fetch(`/api/fitness/sessions/${activeSessionId}`);
        if (res.ok) {
          const sessionData = await res.json();
          logs = sessionData.logs || [];
        }
      } catch (e) { console.error(e); }

      plannedExercises.forEach(ex => {
        const exLogs = logs.filter(l => l.exercise_name === ex.exercise_name);
        let targetText = '';
        if (ex.exercise_type === 'Weight') targetText = `${ex.sets || '-'} SETS x ${ex.target_reps || '-'} REPS`;
        if (ex.exercise_type === 'Distance') targetText = `${ex.target_distance || '-'} KM/MI`;
        if (ex.exercise_type === 'Duration') targetText = `${ex.target_duration || '-'} MIN`;

        let logHtml = '';
        exLogs.forEach(l => {
          let val = '';
          if (l.exercise_type === 'Weight') val = `${l.weight} x ${l.reps} (${l.sets} sets)`;
          if (l.exercise_type === 'Distance') val = `${l.distance} dist`;
          if (l.exercise_type === 'Duration') val = `${l.duration} min`;
          logHtml += `<div class="text-xs font-mono bg-[#e8eceb] px-2 py-1 inline-block mr-2 mb-2">Logged: ${val}</div>`;
        });

        const inputHtml = ex.exercise_type === 'Weight'
          ? `<div class="flex gap-2 mt-2"><input type="number" id="w_${ex.id}" placeholder="Weight" class="brutal-input py-1 text-xs" style="width: 80px;"><input type="number" id="r_${ex.id}" placeholder="Reps" class="brutal-input py-1 text-xs" style="width: 80px;"><input type="number" id="s_${ex.id}" placeholder="Sets" class="brutal-input py-1 text-xs" style="width: 80px;"><button onclick="logExercise(${ex.id}, '${ex.exercise_name}', 'Weight')" class="brutal-interactive px-3 py-1 font-mono text-[10px] font-bold uppercase tracking-widest bg-white">Log</button></div>`
          : ex.exercise_type === 'Distance'
            ? `<div class="flex gap-2 mt-2"><input type="number" id="d_${ex.id}" placeholder="Dist" class="brutal-input py-1 text-xs" style="width: 100px;"><button onclick="logExercise(${ex.id}, '${ex.exercise_name}', 'Distance')" class="brutal-interactive px-3 py-1 font-mono text-[10px] font-bold uppercase tracking-widest bg-white">Log</button></div>`
            : `<div class="flex gap-2 mt-2"><input type="number" id="t_${ex.id}" placeholder="Mins" class="brutal-input py-1 text-xs" style="width: 100px;"><button onclick="logExercise(${ex.id}, '${ex.exercise_name}', 'Duration')" class="brutal-interactive px-3 py-1 font-mono text-[10px] font-bold uppercase tracking-widest bg-white">Log</button></div>`;

        container.innerHTML += `
          <div class="brutal-block p-4">
             <div class="flex justify-between items-start">
               <div>
                 <h4 class="font-bold text-lg uppercase tracking-tight">${ex.exercise_name}</h4>
                 <p class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af]">${targetText}</p>
               </div>
               <span class="text-xs font-bold font-mono px-2 py-1 bg-[#31353c] text-white">${ex.exercise_type}</span>
             </div>
             ${logHtml ? `<div class="mt-3">${logHtml}</div>` : ''}
             ${inputHtml}
          </div>
        `;
      });

      // Free log form
      container.innerHTML += `
        <div class="border-t-2 border-dashed border-[#31353c] pt-6 mt-4">
          <h4 class="font-mono text-sm uppercase tracking-widest font-bold mb-4">Add Unplanned Exercise</h4>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
             <input type="text" id="free_name" placeholder="Name" class="brutal-input py-2 text-xs" list="ex-dict">
             <select id="free_type" class="brutal-input py-2 text-xs">
               <option value="Weight">Weight</option>
               <option value="Distance">Distance</option>
               <option value="Duration">Duration</option>
             </select>
             <input type="number" id="free_val1" placeholder="Val 1 (Weight/Dist/Mins)" class="brutal-input py-2 text-xs">
             <input type="number" id="free_val2" placeholder="Val 2 (Reps)" class="brutal-input py-2 text-xs">
             <button onclick="logFreeExercise()" class="brutal-interactive px-3 py-2 font-mono text-[10px] font-bold uppercase tracking-widest bg-white col-span-2 md:col-span-4">Log Extra Exercise</button>
          </div>
        </div>
        <datalist id="ex-dict">
          ${exerciseDictionary.map(e => `<option value="${e.name}">`).join('')}
        </datalist>
      `;
    }

    async function logExercise(exId, name, type) {
      const payload = { exercise_name: name, exercise_type: type };
      if (type === 'Weight') {
        payload.weight = document.getElementById(`w_${exId}`).value;
        payload.reps = document.getElementById(`r_${exId}`).value;
        payload.sets = document.getElementById(`s_${exId}`).value;
      } else if (type === 'Distance') {
        payload.distance = document.getElementById(`d_${exId}`).value;
      } else if (type === 'Duration') {
        payload.duration = document.getElementById(`t_${exId}`).value;
      }

      await fetch(`/api/fitness/sessions/${activeSessionId}/log`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      fetchData(); // reload
    }

    async function logFreeExercise() {
      const name = document.getElementById('free_name').value;
      const type = document.getElementById('free_type').value;
      if (!name) return;
      const payload = { exercise_name: name, exercise_type: type };

      const v1 = document.getElementById('free_val1').value;
      const v2 = document.getElementById('free_val2').value;

      if (type === 'Weight') { payload.weight = v1; payload.reps = v2; payload.sets = 1; }
      else if (type === 'Distance') { payload.distance = v1; }
      else if (type === 'Duration') { payload.duration = v1; }

      await fetch(`/api/fitness/sessions/${activeSessionId}/log`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      fetchData();
    }

    async function completeSession() {
      await fetch(`/api/fitness/sessions/${activeSessionId}/complete`, { method: 'PUT' });
      activeSessionId = null;
      fetchData();
    }

    function renderHistory(sessions) {
      const container = document.getElementById('history-container');
      if (!sessions.length) {
        container.innerHTML = `<p class="font-mono text-xs uppercase tracking-widest text-[#9ca3af]">No history found.</p>`;
        return;
      }
      container.innerHTML = sessions.map(s => `
        <div class="brutal-interactive p-4 bg-white cursor-pointer" onclick="viewSession(${s.id})">
          <div class="flex justify-between items-center mb-2">
            <h4 class="font-bold uppercase tracking-tight">${s.day_name || s.template_name || 'Legacy Session'}</h4>
            <span class="font-mono text-[10px] text-[#9ca3af]">${s.session_date}</span>
          </div>
          <div class="flex gap-4 font-mono text-[10px] uppercase tracking-widest">
            <span><i data-lucide="activity" class="w-3 h-3 inline"></i> ${s.log_count} Exercises</span>
            <span><i data-lucide="check" class="w-3 h-3 inline"></i> ${s.completed_at ? 'Complete' : 'Incomplete'}</span>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function renderPRs(prs) {
      const container = document.getElementById('prs-list');
      if (!prs.length) {
        container.innerHTML = `<p class="font-mono text-xs uppercase tracking-widest text-[#9ca3af] py-4">No PRs recorded.</p>`;
        return;
      }
      container.innerHTML = prs.map(pr => {
        let val = '';
        if (pr.exercise_type === 'Weight') val = `${pr.best_weight} <span class="text-sm">x ${pr.best_reps || '?'}</span>`;
        if (pr.exercise_type === 'Distance') val = `${pr.best_distance} Dist`;
        if (pr.exercise_type === 'Duration') val = `${pr.best_duration} Min`;

        return `
        <div class="py-4 border-b-2 border-dashed border-[#e8eceb] flex justify-between items-center">
          <div>
            <h4 class="font-bold text-sm uppercase tracking-tight">${pr.exercise_name}</h4>
            <p class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] mt-1">${pr.date_achieved}</p>
          </div>
          <div class="text-2xl font-black tracking-tighter text-[#31353c]">${val}</div>
        </div>
      `}).join('');
    }

    function renderTemplates(templates) {
      const container = document.getElementById('templates-list');
      container.innerHTML = templates.map(t => `
        <div class="brutal-block p-6 ${t.active ? 'border-[var(--pigment-blue)] bg-[#f9fafb]' : 'bg-white'}">
          <div class="flex justify-between items-start mb-4">
             <h3 class="font-bold text-lg uppercase tracking-tight">${t.name}</h3>
             ${t.active ? '<span class="font-mono text-[10px] font-bold px-2 py-1 bg-[var(--pigment-blue)] text-white uppercase">Active</span>' : ''}
          </div>
          <p class="text-sm text-[#9ca3af] mb-6 line-clamp-2">${t.description || 'No description'}</p>
          <div class="flex gap-2">
            ${!t.active ? `<button onclick="activateTemplate(${t.id})" class="brutal-interactive flex-grow py-2 font-mono text-[10px] uppercase tracking-widest font-bold">Set Active</button>` : `<button onclick="deactivateTemplate(${t.id})" class="brutal-interactive flex-grow py-2 font-mono text-[10px] uppercase tracking-widest font-bold border-2 border-[var(--pigment-red)] text-[var(--pigment-red)] hover:bg-[var(--pigment-red)] hover:text-white">Deactivate</button>`}
            <button onclick="editTemplate(${t.id})" class="brutal-interactive px-3 py-2 bg-white text-[#31353c]" title="Edit"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
            <button onclick="deleteTemplate(${t.id})" class="brutal-interactive px-3 py-2 bg-white text-[var(--pigment-red)] border-[#c26e60]" title="Delete"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>
        </div>
      `).join('');
    }

    async function activateTemplate(id) {
      await fetch(`/api/fitness/templates/${id}/active`, { method: 'POST' });
      fetchData();
    }

    async function deactivateTemplate(id) {
      await fetch(`/api/fitness/templates/${id}/deactivate`, { method: 'POST' });
      fetchData();
    }

    function toggleTemplateForm() {
      const form = document.getElementById('create-template-form');
      form.classList.toggle('hidden');
      if (!form.classList.contains('hidden') && !editingTemplateId) {
        newTemplateDays = [];
        document.getElementById('tpl-new-name').value = '';
        document.getElementById('tpl-new-desc').value = '';
        renderTemplateDays();
      } else if (form.classList.contains('hidden')) {
        editingTemplateId = null;
      }
    }

    async function editTemplate(id) {
      try {
        const res = await fetch(`/api/fitness/templates/${id}`);
        if (!res.ok) return;
        const tpl = await res.json();
        editingTemplateId = tpl.id;
        document.getElementById('tpl-new-name').value = tpl.name;
        document.getElementById('tpl-new-desc').value = tpl.description || '';
        newTemplateDays = tpl.days || [];
        document.getElementById('create-template-form').classList.remove('hidden');
        renderTemplateDays();
        // scroll to form
        document.getElementById('create-template-form').scrollIntoView({ behavior: 'smooth' });
      } catch (e) { console.error(e); }
    }

    async function deleteTemplate(id) {
      if (!confirm('Are you sure you want to delete this template?')) return;
      try {
        await fetch(`/api/fitness/templates/${id}`, { method: 'DELETE' });
        fetchData();
      } catch (e) { console.error(e); }
    }

    function addDayToTemplate() {
      newTemplateDays.push({
        name: '',
        repeat_day: 'Monday',
        exercises: []
      });
      renderTemplateDays();
    }

    function addExerciseToDay(dayIndex) {
      newTemplateDays[dayIndex].exercises.push({
        exercise_name: '',
        exercise_type: 'Weight'
      });
      renderTemplateDays();
    }

    function updateDay(index, field, value) {
      newTemplateDays[index][field] = value;
    }

    function updateExercise(dayIndex, exIndex, field, value) {
      newTemplateDays[dayIndex].exercises[exIndex][field] = value;
      if (field === 'exercise_type') renderTemplateDays(); // Re-render inputs based on type
    }

    function renderTemplateDays() {
      const container = document.getElementById('tpl-days-container');
      const daysOfWeek = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

      container.innerHTML = newTemplateDays.map((d, dIdx) => `
        <div class="brutal-block p-4 bg-white">
          <div class="grid grid-cols-2 gap-4 mb-4">
            <input type="text" value="${d.name}" onchange="updateDay(${dIdx}, 'name', this.value)" class="brutal-input py-2 text-xs" placeholder="Day Name (e.g. Push)">
            <select onchange="updateDay(${dIdx}, 'repeat_day', this.value)" class="brutal-input py-2 text-xs">
              ${daysOfWeek.map(day => `<option value="${day}" ${d.repeat_day === day ? 'selected' : ''}>${day}</option>`).join('')}
            </select>
          </div>
          
          <div class="pl-4 border-l-2 border-[#31353c] flex flex-col gap-3 mb-4">
             ${d.exercises.map((ex, eIdx) => `
               <div class="flex flex-wrap gap-2 items-center bg-[#f9fafb] p-2 border-2 border-[#e8eceb]">
                 <input type="text" value="${ex.exercise_name}" onchange="updateExercise(${dIdx}, ${eIdx}, 'exercise_name', this.value)" placeholder="Exercise" class="brutal-input py-1 text-xs" style="width: 150px;" list="ex-dict">
                 <select onchange="updateExercise(${dIdx}, ${eIdx}, 'exercise_type', this.value)" class="brutal-input py-1 text-xs" style="width: 100px;">
                    <option value="Weight" ${ex.exercise_type === 'Weight' ? 'selected' : ''}>Weight</option>
                    <option value="Distance" ${ex.exercise_type === 'Distance' ? 'selected' : ''}>Distance</option>
                    <option value="Duration" ${ex.exercise_type === 'Duration' ? 'selected' : ''}>Duration</option>
                 </select>
                 ${ex.exercise_type === 'Weight' ? `
                   <input type="number" placeholder="Sets" value="${ex.sets || ''}" onchange="updateExercise(${dIdx}, ${eIdx}, 'sets', this.value)" class="brutal-input py-1 text-xs" style="width: 60px;">
                   <input type="number" placeholder="Reps" value="${ex.target_reps || ''}" onchange="updateExercise(${dIdx}, ${eIdx}, 'target_reps', this.value)" class="brutal-input py-1 text-xs" style="width: 60px;">
                 ` : ex.exercise_type === 'Distance' ? `
                   <input type="number" placeholder="Target Dist" value="${ex.target_distance || ''}" onchange="updateExercise(${dIdx}, ${eIdx}, 'target_distance', this.value)" class="brutal-input py-1 text-xs" style="width: 100px;">
                 ` : `
                   <input type="number" placeholder="Target Mins" value="${ex.target_duration || ''}" onchange="updateExercise(${dIdx}, ${eIdx}, 'target_duration', this.value)" class="brutal-input py-1 text-xs" style="width: 100px;">
                 `}
               </div>
             `).join('')}
          </div>
          <button onclick="addExerciseToDay(${dIdx})" class="font-mono text-[10px] uppercase tracking-widest font-bold text-[#9ca3af] hover:text-[#31353c]">+ Add Exercise</button>
        </div>
      `).join('');
    }

    async function saveTemplate() {
      const payload = {
        name: document.getElementById('tpl-new-name').value,
        description: document.getElementById('tpl-new-desc').value,
        days: newTemplateDays
      };

      try {
        const url = editingTemplateId ? `/api/fitness/templates/${editingTemplateId}` : '/api/fitness/templates';
        const method = editingTemplateId ? 'PUT' : 'POST';
        await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        document.getElementById('create-template-form').classList.add('hidden');
        document.getElementById('tpl-new-name').value = '';
        document.getElementById('tpl-new-desc').value = '';
        editingTemplateId = null;
        fetchData();
      } catch (e) { console.error(e); }
    }

    // --- SESSION DETAILS MODAL LOGIC ---
    async function viewSession(id) {
      try {
        const res = await fetch(`/api/fitness/sessions/${id}`);
        if (!res.ok) return;
        const s = await res.json();

        let logsHtml = '';
        if (s.logs && s.logs.length > 0) {
          logsHtml = s.logs.map(l => {
            return `
              <div class="p-3 bg-[#f9fafb] border-2 border-[#e8eceb] mb-2 flex flex-col md:flex-row md:items-center justify-between gap-2">
                 <div>
                   <h5 class="font-bold uppercase tracking-tight text-sm">${l.exercise_name} <span class="font-mono text-[10px] bg-[#31353c] text-white px-1 ml-1">${l.exercise_type}</span></h5>
                 </div>
                 <div class="flex flex-wrap gap-2 items-center">
                   ${l.exercise_type === 'Weight' ? `
                     <input type="number" id="elog_w_${l.id}" value="${l.weight || ''}" class="brutal-input py-1 text-[10px]" style="width:60px;" placeholder="W">
                     <span class="text-xs">x</span>
                     <input type="number" id="elog_r_${l.id}" value="${l.reps || ''}" class="brutal-input py-1 text-[10px]" style="width:50px;" placeholder="R">
                     <input type="number" id="elog_s_${l.id}" value="${l.sets || ''}" class="brutal-input py-1 text-[10px]" style="width:50px;" placeholder="S">
                   ` : l.exercise_type === 'Distance' ? `
                     <input type="number" id="elog_d_${l.id}" value="${l.distance || ''}" class="brutal-input py-1 text-[10px]" style="width:70px;" placeholder="Dist">
                   ` : `
                     <input type="number" id="elog_t_${l.id}" value="${l.duration || ''}" class="brutal-input py-1 text-[10px]" style="width:70px;" placeholder="Min">
                   `}
                   <button onclick="updateLog(${l.id}, ${s.id}, '${l.exercise_type}')" class="px-2 py-1 font-mono text-[10px] font-bold bg-[#31353c] text-white uppercase tracking-widest hover:bg-black">Save</button>
                   <button onclick="deleteLog(${l.id}, ${s.id})" class="px-2 py-1 font-mono text-[10px] font-bold bg-[var(--pigment-red)] text-white uppercase tracking-widest">Del</button>
                 </div>
              </div>
            `;
          }).join('');
        } else {
          logsHtml = `<p class="font-mono text-xs uppercase text-[#9ca3af]">No exercises logged for this session.</p>`;
        }

        const modalHtml = `
          <div id="session-modal" class="fixed inset-0 bg-[#31353c]/80 flex items-center justify-center z-[100] p-4">
            <div class="brutal-block p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
              <div class="flex justify-between items-start mb-6 border-b-2 border-[#31353c] pb-4">
                 <div>
                   <h2 class="text-2xl font-black uppercase tracking-tighter">${s.day_name || s.template_name || 'Session'}</h2>
                   <p class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af]">${s.session_date}</p>
                 </div>
                 <button onclick="closeSessionModal()" class="text-[#31353c] hover:text-[var(--pigment-red)]"><i data-lucide="x" class="w-6 h-6"></i></button>
              </div>

              <div class="mb-6">
                 <h4 class="font-mono text-sm uppercase tracking-widest font-bold mb-4">Logged Exercises</h4>
                 ${logsHtml}
              </div>

              <div class="flex justify-between mt-8 pt-4 border-t-2 border-dashed border-[#e8eceb]">
                <button onclick="deleteSession(${s.id})" class="brutal-interactive px-4 py-2 font-mono text-[10px] uppercase tracking-widest font-bold bg-[var(--pigment-red)] text-white">Delete Session</button>
                <button onclick="closeSessionModal()" class="brutal-interactive px-6 py-2 font-mono text-xs uppercase tracking-widest font-bold bg-white text-[#31353c]">Close</button>
              </div>
            </div>
          </div>
        `;

        const existing = document.getElementById('session-modal');
        if (existing) existing.remove();
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        lucide.createIcons();
      } catch (e) { console.error(e); }
    }

    function closeSessionModal() {
      const el = document.getElementById('session-modal');
      if (el) el.remove();
    }

    async function updateLog(logId, sessionId, type) {
      const payload = {};
      if (type === 'Weight') {
        payload.weight = document.getElementById(`elog_w_${logId}`).value;
        payload.reps = document.getElementById(`elog_r_${logId}`).value;
        payload.sets = document.getElementById(`elog_s_${logId}`).value;
      } else if (type === 'Distance') {
        payload.distance = document.getElementById(`elog_d_${logId}`).value;
      } else if (type === 'Duration') {
        payload.duration = document.getElementById(`elog_t_${logId}`).value;
      }
      try {
        await fetch(`/api/fitness/sessions/log/${logId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        viewSession(sessionId); // reload modal
      } catch (e) { console.error(e); }
    }

    async function deleteLog(logId, sessionId) {
      if (!confirm('Delete this exercise log?')) return;
      try {
        await fetch(`/api/fitness/sessions/log/${logId}`, { method: 'DELETE' });
        viewSession(sessionId); // reload modal
      } catch (e) { console.error(e); }
    }

    async function deleteSession(id) {
      if (!confirm('Are you sure you want to delete the ENTIRE session?')) return;
      try {
        await fetch(`/api/fitness/sessions/${id}`, { method: 'DELETE' });
        closeSessionModal();
        fetchData();
      } catch (e) { console.error(e); }
    }
    document.getElementById('current-date-display').textContent = new Date().toLocaleDateString('en-GB').replace(/\//g, '.');
  </script>
</body>

</html>
