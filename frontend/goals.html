<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goals | Personal OS</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Custom Brutalist Styling - Concrete + Pigment System */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap');

    :root {
      --bg-base: #ffffff;
      --text-main: #31353c;
      /* Concrete Black */
      --border-light: #e8eceb;
      /* Concrete White */
      --shadow-color: #31353c;

      /* Pigments */
      --pigment-yellow: #c8a97e;
      --pigment-red: #c26e60;
      --pigment-purple: #8d7a8b;
      --pigment-blue: #6e8ca0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Static Brutal Block */
    .brutal-block {
      border: 2px solid var(--text-main);
      background-color: var(--bg-base);
    }

    /* Interactive Brutal Block (Lifts on hover) */
    .brutal-interactive {
      border: 2px solid var(--text-main);
      background-color: var(--bg-base);
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .brutal-interactive:hover {
      transform: translate(-4px, -4px);
      box-shadow: 4px 4px 0px 0px var(--shadow-color);
    }

    /* Brutalist Inputs */
    .brutal-input {
      width: 100%;
      border: 2px solid var(--text-main);
      background-color: #f9fafb;
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      outline: none;
      transition: background-color 0.2s;
    }

    .brutal-input:focus {
      background-color: var(--bg-base);
    }

    /* Select Reset */
    select.brutal-input {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2331353c%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 1rem top 50%;
      background-size: 0.65rem auto;
      cursor: pointer;
    }

    /* Hide Number Input Arrows */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>

<body class="selection:bg-[#e8eceb] p-4 sm:p-8 md:p-12 lg:p-16 flex justify-center">

  <div class="w-full max-w-6xl relative">
    <main class="w-full">

      <!-- System Coordinates / Metadata -->
      <div class="flex justify-between items-start mb-8 text-[10px] font-mono uppercase tracking-widest text-[#9ca3af] relative z-50">
        <div class="flex flex-col gap-1">
          <span>SYS.GOALS // OS</span>
          <span id="current-date-display">--.--.--</span>
        </div>

        <!-- Navigation Dropdown -->
        <div class="relative group z-50">
          <button class="p-2 flex items-center justify-center text-[#31353c] hover:bg-[#31353c] hover:text-white transition-colors border-2 border-[#31353c] bg-white cursor-pointer" aria-label="Menu">
            <i data-lucide="menu" class="w-4 h-4"></i>
          </button>
          
          <!-- Dropdown Content -->
          <div class="absolute right-0 mt-2 w-48 bg-white border-2 border-[#31353c] shadow-[4px_4px_0px_0px_#31353c] opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 flex flex-col z-50 text-left">
            <a href="/dashboard.html" class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#6e8ca0] transition-colors flex items-center gap-2 normal-case">
              <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </a>
            <a href="/goals.html" class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#8d7a8b] transition-colors flex items-center gap-2 normal-case">
              <i data-lucide="target" class="w-4 h-4"></i> Goals
            </a>
            <a href="/projects.html" class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#c26e60] transition-colors flex items-center gap-2 normal-case">
              <i data-lucide="folder" class="w-4 h-4"></i> Projects
            </a>
            <a href="/skills.html" class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#c8a97e] transition-colors flex items-center gap-2 normal-case">
              <i data-lucide="brain" class="w-4 h-4"></i> Skills
            </a>
            <a href="/health.html" class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#c8a97e] transition-colors flex items-center gap-2 normal-case">
              <i data-lucide="activity" class="w-4 h-4"></i> Health
            </a>
            <a href="/fitness.html" class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] hover:text-[#6e8ca0] transition-colors flex items-center gap-2 normal-case">
              <i data-lucide="dumbbell" class="w-4 h-4"></i> Fitness
            </a>
            <a href="/analytics.html" class="px-4 py-3 border-b-2 border-dashed border-[#e8eceb] text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] transition-colors flex items-center gap-2 normal-case">
              <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Analytics
            </a>
            <a href="/settings.html" class="px-4 py-3 text-sm font-bold uppercase tracking-tighter text-[#31353c] hover:bg-[#f9fafb] transition-colors flex items-center gap-2 normal-case">
              <i data-lucide="settings" class="w-4 h-4"></i> Settings
            </a>
          </div>
        </div>
      </div>

      <!-- LIST VIEW -->
      <div id="list-view" class="hidden">
        <header
          class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6 border-b-4 border-[#31353c] pb-8 mt-4 md:mt-0">
          <h1 class="text-5xl md:text-7xl font-black tracking-tighter uppercase leading-none">
            Goals
          </h1>
          <button
            class="brutal-interactive px-6 py-3 font-mono text-[10px] uppercase tracking-widest font-bold bg-[#31353c] text-white"
            onclick="toggleNewGoalForm()" id="new-goal-btn">
            New Goal
          </button>
        </header>

        <div id="new-goal-form-container" class="mb-16 border-4 border-[#31353c] p-6 md:p-8 hidden bg-[#f9fafb]">
          <div class="flex items-center gap-3 mb-6">
            <div class="w-3 h-3 bg-[var(--pigment-purple)]"></div>
            <h2 class="text-xl font-bold tracking-tighter uppercase">Define Goal</h2>
          </div>
          <form id="new-goal-form" class="flex flex-col gap-6 max-w-3xl">
            <div>
              <label class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] block mb-2">Title</label>
              <input type="text" id="goal-title" placeholder="GOAL TITLE" class="brutal-input text-lg font-bold"
                required />
            </div>
            <div>
              <label
                class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] block mb-2">Description</label>
              <input type="text" id="goal-description" placeholder="WHY ARE YOU DOING THIS?" class="brutal-input" />
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div>
                <label
                  class="font-mono text-[10px] uppercase tracking-widest text-[#31353c] font-bold block mb-2">Type</label>
                <select id="goal-type" class="brutal-input">
                  <option value="Identity">Identity</option>
                  <option value="Outcome">Outcome</option>
                  <option value="Milestone">Milestone</option>
                </select>
              </div>
              <div>
                <label
                  class="font-mono text-[10px] uppercase tracking-widest text-[#31353c] font-bold block mb-2">Category</label>
                <select id="goal-category" class="brutal-input">
                  <option value="Career">Career</option>
                  <option value="Education">Education</option>
                  <option value="Fitness">Fitness</option>
                  <option value="Health">Health</option>
                  <option value="Finance">Finance</option>
                  <option value="Personal">Personal</option>
                  <option value="Business">Business</option>
                  <option value="Learning">Learning</option>
                  <option value="Custom">Custom</option>
                </select>
              </div>
              <div>
                <label
                  class="font-mono text-[10px] uppercase tracking-widest text-[#31353c] font-bold block mb-2">Priority</label>
                <select id="goal-priority" class="brutal-input">
                  <option value="Low">Low</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="High">High</option>
                  <option value="Critical">Critical</option>
                </select>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div>
                <label
                  class="font-mono text-[10px] uppercase tracking-widest text-[#31353c] font-bold block mb-2">Schedule
                  Type</label>
                <select id="goal-schedule" class="brutal-input">
                  <option value="Flexible">Flexible</option>
                  <option value="Deadline">Deadline</option>
                </select>
              </div>
              <div>
                <label
                  class="font-mono text-[10px] uppercase tracking-widest text-[#31353c] font-bold block mb-2">Target
                  Date</label>
                <input type="date" id="goal-target-date" class="brutal-input" />
              </div>
              <div>
                <label class="font-mono text-[10px] uppercase tracking-widest text-[#31353c] font-bold block mb-2">Life
                  Area</label>
                <select id="goal-life-area" class="brutal-input">
                  <option value="">None</option>
                </select>
              </div>
            </div>

            <div class="mt-4">
              <button type="submit"
                class="brutal-interactive px-8 py-3 font-mono text-xs uppercase tracking-widest font-bold bg-[#31353c] text-white">Create
                Goal</button>
            </div>
          </form>
        </div>

        <div id="goals-list" class="flex flex-col gap-6">
          <!-- Goals injected by JS -->
          <div
            class="flex items-center gap-3 text-[#9ca3af] font-mono text-sm uppercase tracking-widest animate-pulse py-8">
            <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Compiling Goals...
          </div>
        </div>
      </div>

      <!-- DETAIL VIEW -->
      <div id="detail-view" class="hidden">
        <header
          class="mb-12 border-b-4 border-[#31353c] pb-8 mt-4 md:mt-0 relative group flex flex-col lg:flex-row lg:justify-between lg:items-end gap-6">
          <button onclick="window.location.search=''"
            class="absolute -top-10 left-0 font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] hover:text-[#31353c] flex items-center gap-1 transition-colors cursor-pointer">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Archive
          </button>

          <div>
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter uppercase leading-none mt-6" id="detail-title">
              ...
            </h1>
            <p class="text-[#31353c] font-medium text-lg mt-4 max-w-3xl" id="detail-description">...</p>
          </div>

          <div class="w-full lg:w-48 relative">
            <label
              class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] block mb-2 lg:absolute lg:-top-5 lg:left-0">Status</label>
            <select id="detail-status" class="brutal-input font-bold uppercase tracking-widest text-xs"
              onchange="updateGoalStatus(this.value)">
              <option value="Idea">Idea</option>
              <option value="Planned">Planned</option>
              <option value="Active">Active</option>
              <option value="Completed">Completed</option>
              <option value="Archived">Archived</option>
              <option value="Cancelled">Cancelled</option>
            </select>
          </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-16 lg:gap-12">

          <!-- Left Col -->
          <div class="lg:col-span-2">
            <div class="flex items-center gap-3 mb-6">
              <div class="w-3 h-3 bg-[#31353c]"></div>
              <h2 class="text-xl font-bold tracking-tighter uppercase">Execution Tasks</h2>
            </div>

            <form id="add-task-form" class="mb-8">
              <div class="relative w-full">
                <input type="text" id="new-task-title" class="brutal-input pr-12" placeholder="ADD NEXT STEP..."
                  required />
                <button type="submit"
                  class="absolute right-0 top-0 h-full px-4 text-[#31353c] hover:bg-[#e8eceb] transition-colors border-l-2 border-[#31353c]">
                  <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
              </div>
            </form>

            <div id="detail-checklists" class="flex flex-col gap-8">
              <!-- Checklists injected here -->
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mt-12 border-t-4 border-[#31353c] pt-12">
              <div>
                <div class="flex items-center gap-3 mb-6">
                  <div class="w-3 h-3 bg-[var(--pigment-yellow)] border border-[#31353c]"></div>
                  <h2 class="text-xl font-bold tracking-tighter uppercase">Linked Skills</h2>
                </div>
                <div class="flex flex-col gap-4">
                  <select id="link-skill-select" class="brutal-input" onchange="handleLinkSkill(this.value)">
                    <option value="" disabled selected>+ Link Skill</option>
                  </select>
                  <div id="linked-skills-list" class="flex flex-col gap-1 border-l-2 border-[#e8eceb] pl-4"></div>
                </div>
              </div>

              <div>
                <div class="flex items-center gap-3 mb-6">
                  <div class="w-3 h-3 bg-[var(--pigment-red)] border border-[#31353c]"></div>
                  <h2 class="text-xl font-bold tracking-tighter uppercase">Linked Projects</h2>
                </div>
                <div class="flex flex-col gap-4">
                  <select id="link-project-select" class="brutal-input" onchange="handleLinkProject(this.value)">
                    <option value="" disabled selected>+ Link Project</option>
                  </select>
                  <div id="linked-projects-list" class="flex flex-col gap-1 border-l-2 border-[#e8eceb] pl-4"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Right Col -->
          <div>
            <div class="flex items-center gap-3 mb-6">
              <div class="w-3 h-3 bg-[#e8eceb] border border-[#31353c]"></div>
              <h2 class="text-xl font-bold tracking-tighter uppercase">Overview</h2>
            </div>

            <div class="brutal-block p-6 flex flex-col gap-6">

              <div>
                <div class="flex justify-between items-center mb-2">
                  <h3 class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af]">Global Progress</h3>
                  <select id="detail-progress-mode"
                    class="bg-transparent border-none outline-none cursor-pointer text-right uppercase tracking-widest text-[10px] font-mono text-[#31353c] font-bold"
                    onchange="handleUpdateGoal({ progress_mode: this.value })">
                    <option value="Checklist">Checklist Mode</option>
                    <option value="Linked">Linked Mode</option>
                    <option value="Manual">Manual Mode</option>
                  </select>
                </div>

                <div class="flex justify-between items-baseline mb-3">
                  <span class="text-4xl font-black tracking-tighter text-[#31353c]" id="detail-progress-text">0%</span>
                  <input type="number" id="detail-manual-progress"
                    class="brutal-input w-24 py-1 px-2 text-right text-xs hidden"
                    onchange="handleUpdateGoal({ manual_progress: this.value })" min="0" max="100" />
                </div>

                <div id="detail-progress-bar" class="w-full h-3 border-2 border-[#31353c] bg-[#f9fafb] overflow-hidden">
                  <div class="h-full bg-[var(--pigment-purple)] transition-all duration-500" style="width: 0%"></div>
                </div>
              </div>

              <div class="border-t-2 border-dashed border-[#e8eceb] pt-6">
                <h3 class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] mb-1">Schedule</h3>
                <p class="text-xl font-bold tracking-tight" id="detail-schedule-type">Flexible</p>
                <div id="detail-schedule-info"
                  class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] mt-2"></div>
              </div>

              <div class="border-t-2 border-dashed border-[#e8eceb] pt-6">
                <h3 class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] mb-1">Priority</h3>
                <span id="detail-priority"
                  class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest bg-[#31353c] text-white inline-block mt-1">Medium</span>
              </div>

              <div id="targets-container" class="border-t-2 border-dashed border-[#e8eceb] pt-6 hidden">
                <h3 class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] mb-4">Health / Fitness Targets
                </h3>
                <form id="add-target-form" class="flex gap-2 mb-4">
                  <select id="new-target-type" class="brutal-input py-2 px-2 flex-grow">
                    <option value="weight">Weight</option>
                    <option value="body_fat">Body Fat %</option>
                    <option value="calories">Calories</option>
                    <option value="workouts">Workouts</option>
                  </select>
                  <input type="number" id="new-target-value" class="brutal-input py-2 px-2 w-20 text-center"
                    placeholder="VAL" required />
                  <button type="submit" class="brutal-interactive px-3 py-2 text-[#31353c] bg-[#f9fafb]"><i
                      data-lucide="plus" class="w-4 h-4"></i></button>
                </form>
                <div id="detail-targets" class="flex flex-col gap-2"></div>
              </div>

            </div>

            <div class="flex items-center gap-3 mb-6 mt-16">
              <div class="w-3 h-3 bg-[#9ca3af] border border-[#31353c]"></div>
              <h2 class="text-xl font-bold tracking-tighter uppercase">Timeline</h2>
            </div>

            <div id="detail-timeline" class="border-l-2 border-[#31353c] ml-1.5 pl-6 flex flex-col gap-6">
            </div>
          </div>

        </div>
      </div>

    </main>
  </div>

  <script src="/app.js"></script>
  <script>
    lucide.createIcons();
    document.getElementById('current-date-display').textContent = new Date().toLocaleDateString('en-GB').replace(/\//g, '.');

    const urlParams = new URLSearchParams(window.location.search);
    const goalId = urlParams.get('id');

    // Format utility
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-GB').replace(/\//g, '.');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (goalId) {
        document.getElementById('detail-view').classList.remove('hidden');
        await loadDetailView();
      } else {
        document.getElementById('list-view').classList.remove('hidden');
        await loadListView();
      }
    });

    // --- LIST VIEW LOGIC ---
    async function loadListView() {
      await fetchLifeAreas('goal-life-area');
      await fetchGoals();

      if (window.HBT_SETTINGS) {
        document.getElementById('goal-type').value = window.HBT_SETTINGS.default_goal_type || 'Milestone';
      }

      document.getElementById('new-goal-form').addEventListener('submit', handleCreateGoal);
    }

    function toggleNewGoalForm() {
      const container = document.getElementById('new-goal-form-container');
      const btn = document.getElementById('new-goal-btn');
      if (container.classList.contains('hidden')) {
        container.classList.remove('hidden');
        btn.innerHTML = 'Cancel';
      } else {
        container.classList.add('hidden');
        btn.innerHTML = 'New Goal';
      }
    }

    async function fetchLifeAreas(selectId) {
      try {
        const res = await fetch('http://localhost:3000/api/skills/life-areas');
        if (res.ok) {
          const areas = await res.json();
          const select = document.getElementById(selectId);
          areas.forEach(a => {
            select.insertAdjacentHTML('beforeend', `<option value="${a.id}">${a.name}</option>`);
          });
        }
      } catch (e) { console.error(e); }
    }

    async function fetchGoals() {
      const container = document.getElementById('goals-list');
      container.innerHTML = `
        <div class="flex items-center gap-3 text-[#9ca3af] font-mono text-sm uppercase tracking-widest animate-pulse py-8">
          <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Compiling Goals...
        </div>
      `;
      try {
        const res = await fetch('http://localhost:3000/api/goals');
        if (res.ok) {
          const goals = await res.json();
          if (goals.length === 0) {
            container.innerHTML = `
              <div class="py-12 border-2 border-dashed border-[#e8eceb] flex flex-col items-center justify-center text-[#9ca3af]">
                <i data-lucide="target" class="w-8 h-8 mb-4 opacity-50"></i>
                <p class="font-mono text-xs uppercase tracking-widest">No goals defined.</p>
              </div>
            `;
            lucide.createIcons();
            return;
          }

          container.innerHTML = goals.map(goal => `
            <div class="brutal-interactive p-6 flex flex-col cursor-pointer bg-white" onclick="window.location.href='?id=${goal.id}'">
              <div class="flex justify-between items-start mb-6">
                <div>
                  <span class="px-2 py-1 text-[10px] font-bold uppercase tracking-widest mr-3 ${goal.priority === 'Critical' ? 'bg-[#c26e60] text-white' : 'border-2 border-[#e8eceb] text-[#31353c]'}">${goal.priority}</span>
                  <h3 class="inline font-bold text-2xl tracking-tighter uppercase">${goal.title}</h3>
                </div>
                <span class="font-mono text-[10px] uppercase tracking-widest font-bold px-2 py-1 ${goal.status === 'Completed' ? 'bg-[#31353c] text-white' : 'bg-[#e8eceb] text-[#31353c]'}">${goal.status}</span>
              </div>
              
              <div class="flex flex-wrap gap-4 font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] font-bold mb-6">
                <span class="flex items-center gap-1 text-[#31353c]"><i data-lucide="tag" class="w-3 h-3 text-[#9ca3af]"></i> ${goal.category}</span>
                ${goal.life_area_name ? `<span class="flex items-center gap-1"><i data-lucide="compass" class="w-3 h-3 text-[#9ca3af]"></i> ${goal.life_area_name}</span>` : ''}
                ${goal.target_date ? `<span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3 text-[#9ca3af]"></i> TGT: ${formatDate(goal.target_date)}</span>` : ''}
              </div>
              
              <div class="flex justify-between font-mono text-[10px] uppercase tracking-widest text-[#31353c] font-bold mb-2">
                 <span>Progress</span>
                 <span>${goal.progress}%</span>
              </div>
              <div class="w-full h-2 border-2 border-[#31353c] bg-[#f9fafb] overflow-hidden">
                <div class="bg-[var(--pigment-purple)] h-full transition-all" style="width: ${Math.min(100, Math.max(0, goal.progress))}%"></div>
              </div>
            </div>
          `).join('');
          lucide.createIcons();
        }
      } catch (e) {
        console.error(e);
        container.innerHTML = `
          <div class="p-6 border-2 border-[var(--pigment-red)] bg-[#fdf5f4] text-[var(--pigment-red)] font-mono text-xs uppercase tracking-widest">
            ERR: Connection to localhost:3000 refused.
          </div>
        `;
      }
    }

    async function handleCreateGoal(e) {
      e.preventDefault();
      const payload = {
        title: document.getElementById('goal-title').value,
        description: document.getElementById('goal-description').value,
        goal_type: document.getElementById('goal-type').value,
        category: document.getElementById('goal-category').value,
        priority: document.getElementById('goal-priority').value,
        schedule_type: document.getElementById('goal-schedule').value,
        target_date: document.getElementById('goal-target-date').value,
        life_area_id: document.getElementById('goal-life-area').value
      };

      try {
        const res = await fetch('http://localhost:3000/api/goals', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          toggleNewGoalForm();
          document.getElementById('new-goal-form').reset();
          fetchGoals();
        }
      } catch (e) { console.error(e); }
    }

    // --- DETAIL VIEW LOGIC ---
    let globalGoalData = null;

    async function loadDetailView() {
      try {
        const [goalRes, timelineRes, skillsRes, projectsRes] = await Promise.all([
          fetch(`http://localhost:3000/api/goals/${goalId}`),
          fetch(`http://localhost:3000/api/goals/${goalId}/timeline`),
          fetch(`http://localhost:3000/api/skills`),
          fetch(`http://localhost:3000/api/projects`)
        ]);

        if (goalRes.ok) {
          const goal = await goalRes.json();
          globalGoalData = goal;
          renderDetailView(goal);
        }
        if (timelineRes.ok) renderTimeline(await timelineRes.json());
        if (skillsRes.ok) populateSkillsDropdown(await skillsRes.json());
        if (projectsRes.ok) populateProjectsDropdown(await projectsRes.json());

      } catch (e) {
        console.error(e);
        document.getElementById('detail-title').textContent = "ERROR";
      }

      document.getElementById('add-task-form').addEventListener('submit', handleAddTask);
      document.getElementById('add-target-form').addEventListener('submit', handleAddTarget);
    }

    function renderDetailView(goal) {
      document.title = `${goal.title} | Goals`;
      document.getElementById('detail-title').textContent = goal.title;
      document.getElementById('detail-description').textContent = goal.description || 'NO DESCRIPTION SET.';
      document.getElementById('detail-status').value = goal.status;

      // Checklists
      const clContainer = document.getElementById('detail-checklists');
      if (!goal.checklists || goal.checklists.length === 0) {
        clContainer.innerHTML = `
          <div class="py-12 border-2 border-dashed border-[#e8eceb] flex flex-col items-center justify-center text-[#9ca3af] bg-[#f9fafb]">
            <i data-lucide="clipboard-list" class="w-8 h-8 mb-4 opacity-50"></i>
            <p class="font-mono text-xs uppercase tracking-widest">No tasks defined.</p>
          </div>
        `;
      } else {
        clContainer.innerHTML = goal.checklists.map(checklist => `
          <div class="mb-6">
            <h3 class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] border-b-2 border-[#31353c] pb-2 mb-4">
              ${checklist.title}
            </h3>
            <div class="flex flex-col border-l-2 border-[#31353c] pl-4 gap-1">
              ${checklist.items.map(item => `
                <label class="group flex items-start gap-4 p-4 border-2 border-transparent hover:border-[#e8eceb] cursor-pointer transition-colors bg-white">
                  <div class="relative flex items-center justify-center mt-0.5">
                    <input type="checkbox" class="peer sr-only" ${item.completed ? 'checked' : ''} onchange="toggleTask(${item.id}, ${item.completed})" />
                    <div class="w-6 h-6 border-2 flex items-center justify-center transition-colors duration-200 ${item.completed ? 'bg-[var(--pigment-purple)] border-[var(--pigment-purple)]' : 'border-[#31353c] bg-transparent group-hover:bg-[#f9fafb]'}">
                      <i data-lucide="check" class="w-4 h-4 text-white transition-opacity ${item.completed ? 'opacity-100' : 'opacity-0'}"></i>
                    </div>
                  </div>
                  <div class="flex flex-col flex-1">
                    <span class="text-xl md:text-2xl font-bold tracking-tight transition-all duration-200 ${item.completed ? 'text-[#9ca3af] line-through' : 'text-[#31353c]'}">
                      ${item.title}
                    </span>
                  </div>
                </label>
              `).join('')}
            </div>
          </div>
        `).join('');
      }

      // Progress
      document.getElementById('detail-progress-mode').value = goal.progress_mode || 'Checklist';
      document.getElementById('detail-progress-text').textContent = `${goal.progress}%`;

      const manualInput = document.getElementById('detail-manual-progress');
      if (goal.progress_mode === 'Manual') {
        manualInput.classList.remove('hidden');
        manualInput.value = goal.manual_progress || 0;
      } else {
        manualInput.classList.add('hidden');
      }

      document.getElementById('detail-progress-bar').innerHTML = `
        <div class="h-full bg-[var(--pigment-purple)] transition-all duration-500" style="width: ${goal.progress}%"></div>
      `;

      // Schedule
      document.getElementById('detail-schedule-type').textContent = goal.schedule_type;
      const schedInfo = document.getElementById('detail-schedule-info');
      if (!goal.started_at) {
        schedInfo.innerHTML = '<span class="px-2 py-1 bg-[#e8eceb] text-[#31353c]">NOT STARTED</span>';
      } else {
        const today = new Date();
        if (goal.schedule_type === 'Flexible') {
          const started = new Date(goal.started_at);
          const daysActive = Math.floor((today - started) / (1000 * 60 * 60 * 24));
          schedInfo.innerHTML = `<span class="px-2 py-1 bg-[#f9fafb] border border-[#e8eceb] text-[#31353c]">${daysActive} DAYS ACTIVE</span>`;
        } else {
          if (!goal.target_date) {
            schedInfo.innerHTML = '<span class="px-2 py-1 bg-[#fdf5f4] text-[#c26e60]">NO TARGET DATE SET</span>';
          } else {
            const target = new Date(goal.target_date);
            const daysRemaining = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            if (daysRemaining >= 0) {
              schedInfo.innerHTML = `<span class="px-2 py-1 bg-[#f9fafb] border border-[#e8eceb] text-[#31353c]">${daysRemaining} DAYS REMAINING</span>`;
            } else {
              schedInfo.innerHTML = `<span class="px-2 py-1 bg-[#fdf5f4] border border-[#c26e60] text-[#c26e60]">${Math.abs(daysRemaining)} DAYS OVERDUE</span>`;
            }
          }
        }
      }

      // Priority
      const pColor = goal.priority === 'Critical' ? 'bg-[#c26e60]' : 'bg-[#31353c]';
      document.getElementById('detail-priority').textContent = goal.priority;
      document.getElementById('detail-priority').className = `px-3 py-1 text-[10px] font-bold uppercase tracking-widest ${pColor} text-white inline-block mt-1`;

      // Targets
      if (goal.targets !== undefined) {
        document.getElementById('targets-container').classList.remove('hidden');
        document.getElementById('detail-targets').innerHTML = goal.targets.map(t => `
          <div class="flex justify-between items-center text-sm py-2 border-b-2 border-dashed border-[#e8eceb]">
            <span class="font-bold text-[#31353c] uppercase tracking-tight">${t.target_type.replace('_', ' ')}</span>
            <span class="font-mono font-bold text-[#31353c]">${t.current_value} / ${t.target_value}</span>
          </div>
        `).join('');
      }

      // Render Linked
      renderLinkedLists(goal);
      lucide.createIcons();
    }

    function renderTimeline(timeline) {
      const container = document.getElementById('detail-timeline');
      if (timeline.length === 0) {
        container.innerHTML = '<p class="text-[#9ca3af] font-mono text-[10px] uppercase tracking-widest py-2">No activity recorded.</p>';
      } else {
        container.innerHTML = timeline.map(event => `
          <div class="relative">
            <div class="absolute w-3 h-3 bg-[#e8eceb] border-2 border-[#31353c] -left-[31px] top-0.5"></div>
            <h4 class="font-bold text-sm text-[#31353c] uppercase tracking-tight">${event.action}</h4>
            <p class="text-[#9ca3af] text-xs font-mono tracking-wide mt-1">${event.description}</p>
            <span class="font-mono text-[10px] uppercase tracking-widest text-[#9ca3af] mt-2 block">${formatDate(event.created_at)}</span>
          </div>
        `).join('');
      }
    }

    function populateSkillsDropdown(skills) {
      const select = document.getElementById('link-skill-select');
      select.innerHTML = '<option value="" disabled selected>+ Link Skill</option>';
      const linkedIds = globalGoalData?.skills?.map(s => s.id) || [];
      skills.filter(s => !linkedIds.includes(s.id)).forEach(s => {
        select.insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.name}</option>`);
      });
    }

    function populateProjectsDropdown(projects) {
      const select = document.getElementById('link-project-select');
      select.innerHTML = '<option value="" disabled selected>+ Link Project</option>';
      const linkedIds = globalGoalData?.projects?.map(p => p.id) || [];
      projects.filter(p => !linkedIds.includes(p.id)).forEach(p => {
        select.insertAdjacentHTML('beforeend', `<option value="${p.id}">${p.name}</option>`);
      });
    }

    function renderLinkedLists(goal) {
      const skillsContainer = document.getElementById('linked-skills-list');
      if (!goal.skills || goal.skills.length === 0) {
        skillsContainer.innerHTML = '<p class="text-[#9ca3af] font-mono text-[10px] uppercase tracking-widest py-2">No linked skills.</p>';
      } else {
        skillsContainer.innerHTML = goal.skills.map(s => `
          <div class="flex justify-between items-center py-2 border-b-2 border-dashed border-[#e8eceb] hover:bg-[#f9fafb] transition-colors px-2 -mx-2">
            <span class="font-bold text-sm text-[#31353c]">${s.name}</span>
            <span class="font-mono text-[10px] font-bold uppercase tracking-widest text-[#9ca3af]">${s.status}</span>
          </div>
        `).join('');
      }

      const projContainer = document.getElementById('linked-projects-list');
      if (!goal.projects || goal.projects.length === 0) {
        projContainer.innerHTML = '<p class="text-[#9ca3af] font-mono text-[10px] uppercase tracking-widest py-2">No linked projects.</p>';
      } else {
        projContainer.innerHTML = goal.projects.map(p => `
          <div class="flex justify-between items-center py-2 border-b-2 border-dashed border-[#e8eceb] hover:bg-[#f9fafb] transition-colors px-2 -mx-2">
            <span class="font-bold text-sm text-[#31353c]">${p.name}</span>
            <span class="font-mono text-[10px] font-bold uppercase tracking-widest text-[#9ca3af]">${p.status}</span>
          </div>
        `).join('');
      }
    }

    // ACTIONS
    async function updateGoalStatus(status) {
      await handleUpdateGoal({ status });
    }

    async function handleUpdateGoal(updates) {
      try {
        await fetch(`http://localhost:3000/api/goals/${goalId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updates)
        });
        loadDetailView();
      } catch (e) { console.error(e); }
    }

    async function handleAddTask(e) {
      e.preventDefault();
      try {
        await fetch(`http://localhost:3000/api/goals/${goalId}/checklists`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ item_title: document.getElementById('new-task-title').value })
        });
        document.getElementById('new-task-title').value = '';
        loadDetailView();
      } catch (e) { console.error(e); }
    }

    async function toggleTask(itemId, currentStatus) {
      try {
        await fetch(`http://localhost:3000/api/goals/${goalId}/checklists/items/${itemId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ completed: !currentStatus })
        });
        loadDetailView();
      } catch (e) { console.error(e); }
    }

    async function handleLinkSkill(skillId) {
      if (!skillId) return;
      try {
        await fetch(`http://localhost:3000/api/goals/${goalId}/skills`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ skill_id: skillId })
        });
        loadDetailView();
      } catch (e) { console.error(e); }
    }

    async function handleLinkProject(projectId) {
      if (!projectId) return;
      try {
        await fetch(`http://localhost:3000/api/goals/${goalId}/projects`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ project_id: projectId })
        });
        loadDetailView();
      } catch (e) { console.error(e); }
    }

    async function handleAddTarget(e) {
      e.preventDefault();
      try {
        await fetch(`http://localhost:3000/api/goals/${goalId}/targets`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            target_type: document.getElementById('new-target-type').value,
            target_value: document.getElementById('new-target-value').value
          })
        });
        document.getElementById('new-target-value').value = '';
        loadDetailView();
      } catch (e) { console.error(e); }
    }
  </script>
</body>

</html>
